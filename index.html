<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Admin | SullyBec Instituto</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Plus Jakarta Sans', sans-serif; background-color: #fff5f7; -webkit-tap-highlight-color: transparent; padding-bottom: 20px; }
        .pink-gradient { background: linear-gradient(135deg, #ff85a2 0%, #ff4d6d 100%); }
        
        /* Ajuste para que el modal siempre sea scrolleable */
        .modal-container {
            max-height: 90vh;
            display: flex;
            flex-direction: column;
        }
        .modal-content {
            overflow-y: auto;
            flex: 1;
            padding-bottom: 2rem;
        }

        input, select, textarea { border: 1px solid #ffe4e9; border-radius: 12px; padding: 10px; width: 100%; outline: none; font-size: 15px; background: white; }
        label { display: block; font-size: 0.65rem; font-weight: 800; color: #94a3b8; margin-bottom: 2px; text-transform: uppercase; margin-left: 4px; }

        .nav-container { background: #fee2e7; border-radius: 15px; padding: 4px; display: flex; gap: 4px; }
        .nav-btn { flex: 1; padding: 8px 4px; border-radius: 12px; font-weight: 700; font-size: 12px; color: #ff85a2; border: none; cursor: pointer; }
        .nav-btn.active { background: white; color: #ff4d6d; }
    </style>
</head>
<body>
    <header class="bg-white/80 backdrop-blur-md sticky top-0 z-50 px-4 py-3 border-b border-pink-100 shadow-sm">
        <div class="max-w-6xl mx-auto flex flex-col gap-2">
            <div class="flex justify-between items-center">
                <div class="flex items-center gap-2">
                    <div class="w-7 h-7 pink-gradient rounded-lg flex items-center justify-center text-white font-bold text-xs">S</div>
                    <span class="font-bold text-pink-500 text-sm">SullyBec Admin</span>
                </div>
                <div id="status-dot" class="w-2 h-2 rounded-full bg-yellow-400"></div>
            </div>
            <div class="nav-container">
                <button onclick="switchTab('diplomados')" id="tabDip" class="nav-btn active">Diplomados</button>
                <button onclick="switchTab('certificaciones')" id="tabCert" class="nav-btn">Certificados</button>
                <button onclick="switchTab('talleres')" id="tabTal" class="nav-btn">Talleres</button>
            </div>
        </div>
    </header>

    <main class="max-w-6xl mx-auto p-4">
        <section id="sec-diplomados">
            <div class="flex justify-between items-center mb-4">
                <h2 class="text-lg font-extrabold text-gray-800">Diplomados</h2>
                <button onclick="abrirModal('diplomado')" class="pink-gradient text-white px-4 py-2 rounded-xl font-bold text-xs shadow-md">+ Nuevo</button>
            </div>
            <div id="diplomasGrid" class="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-3 gap-4"></div>
        </section>
        <!-- Las otras secciones se mantienen igual estructuralmente -->
        <section id="sec-certificaciones" class="hidden"></section>
        <section id="sec-talleres" class="hidden"></section>
    </main>

    <!-- MODAL DIPLOMADO OPTIMIZADO -->
    <div id="modal-diplomado" class="fixed inset-0 bg-black/60 backdrop-blur-sm hidden items-center justify-center z-[1000] p-4">
        <div class="bg-white rounded-[24px] w-full max-w-xl shadow-2xl modal-container">
            <!-- Header Fijo -->
            <div class="p-4 border-b border-pink-50 flex justify-between items-center">
                <h3 class="font-bold text-pink-600">Configuración</h3>
                <button onclick="cerrarModal('diplomado')" class="w-8 h-8 bg-gray-100 rounded-full flex items-center justify-center text-gray-400">&times;</button>
            </div>
            
            <!-- Cuerpo con Scroll -->
            <form id="diplomadoForm" class="modal-content p-5 space-y-4">
                <input type="hidden" id="editIdDip">
                
                <div><label>Nombre del Diplomado</label><input type="text" id="nombreDip" required></div>
                
                <div class="grid grid-cols-2 gap-3">
                    <div><label>Duración</label><input type="text" id="duracionDip"></div>
                    <div><label>Fecha Inicio</label><input type="date" id="fechaInicioDip"></div>
                </div>
                
                <div><label>Horario</label><input type="text" id="horarioDip"></div>
                
                <div class="bg-pink-50/50 p-4 rounded-2xl border border-pink-100 space-y-3">
                    <div class="flex justify-between items-center">
                        <span class="text-[10px] font-bold text-pink-600 uppercase">Costos y Descuento</span>
                        <div class="w-20"><label>Desc. %</label><input type="number" id="descuentoDip" value="0" oninput="recalcDiplomado()" class="py-1 text-center font-bold"></div>
                    </div>
                    
                    <div>
                        <label>Documentación Final ($)</label>
                        <input type="number" id="docuDip" oninput="recalcDiplomado()" placeholder="0">
                    </div>

                    <div class="grid grid-cols-1 gap-3">
                        <div class="flex items-center gap-2">
                            <div class="flex-1"><label>Clase Individual</label><input type="number" id="claseDip" oninput="recalcDiplomado()"></div>
                            <div class="w-24 text-right pt-4"><span id="resClase" class="text-[11px] font-bold text-pink-500">$0</span></div>
                        </div>
                        <div class="flex items-center gap-2">
                            <div class="flex-1"><label>Mensualidad</label><input type="number" id="mesDip" oninput="recalcDiplomado()"></div>
                            <div class="w-24 text-right pt-4"><span id="resMes" class="text-[11px] font-bold text-pink-500">$0</span></div>
                        </div>
                        <div class="flex items-center gap-2">
                            <div class="flex-1"><label>Pago Único Total</label><input type="number" id="totalDip" oninput="recalcDiplomado()"></div>
                            <div class="w-24 text-right pt-4"><span id="resTotal" class="text-[11px] font-bold text-pink-500">$0</span></div>
                        </div>
                    </div>
                </div>

                <div><label>Inscripción ($)</label><input type="number" id="inscripcionDip"></div>
                <div><label>Link Temario</label><input type="url" id="linkDip"></div>
                
                <!-- Botón al final del scroll -->
                <button type="submit" class="w-full pink-gradient text-white py-3 rounded-xl font-bold shadow-lg sticky bottom-0">Guardar Cambios</button>
            </form>
        </div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-app.js";
        import { getFirestore, collection, addDoc, onSnapshot, serverTimestamp, doc, updateDoc, deleteDoc } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-firestore.js";
        import { getAuth, signInAnonymously, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-auth.js";

        const firebaseConfig = JSON.parse('{"apiKey": "AIzaSyBv4oDOH5mPBN79m_Y47UYa9H1SJ1S7BL8","authDomain": "gestor-de-diplomados.firebaseapp.com","projectId": "gestor-de-diplomados","storageBucket": "gestor-de-diplomados.firebasestorage.app","messagingSenderId": "25065074693","appId": "1:25065074693:web:6541747c26543c709f2c6c"}');
        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);
        const auth = getAuth(app);
        const APP_ID = 'sullybec-admin';

        let dataDip = [];

        onAuthStateChanged(auth, (u) => {
            if (u) {
                document.getElementById('status-dot').className = "w-2 h-2 rounded-full bg-green-400";
                onSnapshot(collection(db, 'artifacts', APP_ID, 'public', 'data', 'diplomados'), snap => {
                    dataDip = snap.docs.map(d => ({ id: d.id, ...d.data() }));
                    renderDip();
                });
            }
        });
        signInAnonymously(auth);

        window.recalcDiplomado = () => {
            const desc = Number(document.getElementById('descuentoDip').value) || 0;
            // Quitamos el sumado automático de documentación en el visor rápido si solo quieres ver el descuento aplicado
            const calc = (val) => {
                const conDesc = val * (1 - (desc / 100));
                return Math.floor(conDesc);
            };

            document.getElementById('resClase').innerText = `Neto: $${calc(Number(document.getElementById('claseDip').value) || 0)}`;
            document.getElementById('resMes').innerText = `Neto: $${calc(Number(document.getElementById('mesDip').value) || 0)}`;
            document.getElementById('resTotal').innerText = `Neto: $${calc(Number(document.getElementById('totalDip').value) || 0)}`;
        };

        window.abrirModal = (tipo, id = null) => {
            const modal = document.getElementById(`modal-${tipo}`);
            modal.style.display = 'flex';
            const form = document.getElementById(`${tipo}Form`);
            form.reset();
            document.getElementById('editIdDip').value = id || '';

            if (id) {
                const d = dataDip.find(x => x.id === id);
                if (d) {
                    document.getElementById('nombreDip').value = d.nombre || '';
                    document.getElementById('duracionDip').value = d.duracion || '';
                    document.getElementById('fechaInicioDip').value = d.fechaInicio || '';
                    document.getElementById('horarioDip').value = d.horario || '';
                    document.getElementById('claseDip').value = d.clase || 0;
                    document.getElementById('mesDip').value = d.mes || 0;
                    document.getElementById('totalDip').value = d.total || 0;
                    document.getElementById('descuentoDip').value = d.descuento || 0;
                    document.getElementById('inscripcionDip').value = d.inscripcion || 0;
                    document.getElementById('docuDip').value = d.documentacion || 0;
                    document.getElementById('linkDip').value = d.link || '';
                }
            }
            recalcDiplomado();
        };

        window.cerrarModal = (tipo) => { document.getElementById(`modal-${tipo}`).style.display = 'none'; };

        function renderDip() {
            const grid = document.getElementById('diplomasGrid');
            grid.innerHTML = dataDip.map(d => {
                const desc = d.descuento || 0;
                const neto = (d.total || 0) * (1 - (desc/100));
                return `
                <div class="bg-white p-4 rounded-2xl border border-pink-50 shadow-sm relative">
                    <h4 class="font-bold text-gray-800 text-sm mb-1">${d.nombre}</h4>
                    <div class="text-[10px] text-pink-400 font-bold mb-3 uppercase">${d.duracion}</div>
                    <div class="flex justify-between items-end">
                        <div>
                            <span class="text-xs text-gray-400">Pago Único Desc:</span>
                            <div class="text-lg font-black text-pink-600">$${Math.floor(neto).toLocaleString()}</div>
                        </div>
                        <button onclick="abrirModal('diplomado', '${d.id}')" class="text-xs bg-gray-50 p-2 rounded-lg">✏️ Editar</button>
                    </div>
                </div>`;
            }).join('');
        }

        document.getElementById('diplomadoForm').onsubmit = async (e) => {
            e.preventDefault();
            const id = document.getElementById('editIdDip').value;
            const payload = {
                nombre: document.getElementById('nombreDip').value,
                duracion: document.getElementById('duracionDip').value,
                fechaInicio: document.getElementById('fechaInicioDip').value,
                horario: document.getElementById('horarioDip').value,
                clase: Number(document.getElementById('claseDip').value),
                mes: Number(document.getElementById('mesDip').value),
                total: Number(document.getElementById('totalDip').value),
                descuento: Number(document.getElementById('descuentoDip').value),
                inscripcion: Number(document.getElementById('inscripcionDip').value),
                documentacion: Number(document.getElementById('docuDip').value),
                link: document.getElementById('linkDip').value,
                updated: serverTimestamp()
            };
            if (id) await updateDoc(doc(db, 'artifacts', APP_ID, 'public', 'data', 'diplomados', id), payload);
            else await addDoc(collection(db, 'artifacts', APP_ID, 'public', 'data', 'diplomados'), payload);
            cerrarModal('diplomado');
        };

        window.switchTab = (tab) => {
            document.getElementById('tabDip').classList.toggle('active', tab === 'diplomados');
            // Lógica de pestañas simplificada para este ejemplo
        };
    </script>
</body>
</html>
