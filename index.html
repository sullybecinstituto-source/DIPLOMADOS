<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Panel | Sullybec Instituto</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700&display=swap" rel="stylesheet">
    <style>
        body { 
            font-family: 'Plus Jakarta Sans', sans-serif; 
            background-color: #fff5f7; 
        }
        .pink-gradient { 
            background: linear-gradient(135deg, #ff85a2 0%, #ff4d6d 100%); 
        }
        .card-shadow { 
            box-shadow: 0 10px 25px -5px rgba(255, 133, 162, 0.1), 0 8px 10px -6px rgba(255, 133, 162, 0.1); 
        }
        input {
            border: 1px solid #ffe4e9;
            border-radius: 12px;
            padding: 12px;
            width: 100%;
            outline: none;
            transition: all 0.3s;
        }
        input:focus {
            border-color: #ff85a2;
            box-shadow: 0 0 0 3px rgba(255, 133, 162, 0.2);
        }
    </style>
</head>
<body>
    <nav class="bg-white border-b border-pink-100 px-8 py-4 flex justify-between items-center sticky top-0 z-50">
        <div class="flex items-center gap-3">
            <div class="w-10 h-10 pink-gradient rounded-full flex items-center justify-center text-white font-bold text-xl shadow-lg">s</div>
            <h1 class="text-2xl font-bold italic text-pink-500">Sullybec.Instituto</h1>
        </div>
    </nav>

    <main class="max-w-6xl mx-auto p-8">
        <div class="flex justify-between items-center mb-10">
            <div>
                <h2 class="text-3xl font-bold text-gray-800">Panel de Administración</h2>
                <p class="text-gray-500">Gestiona los diplomados activos</p>
            </div>
            <button id="btnNuevo" onclick="abrirModal()" class="pink-gradient text-white px-8 py-4 rounded-2xl font-bold shadow-xl hover:scale-105 active:scale-95 transition-all flex items-center gap-2 opacity-50 cursor-not-allowed" disabled>
                <span>+ Nuevo Diplomado</span>
            </button>
        </div>

        <div id="diplomasGrid" class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-8">
            <div class="col-span-full text-center py-20 text-gray-400">
                <p id="statusMsg">Estableciendo conexión segura...</p>
            </div>
        </div>
    </main>

    <div id="modal" class="fixed inset-0 bg-black/50 backdrop-blur-sm hidden flex items-center justify-center z-[100] p-4">
        <div class="bg-white rounded-3xl w-full max-w-md shadow-2xl overflow-hidden">
            <div class="p-6 border-b border-pink-50 flex justify-between items-center bg-pink-50/30">
                <h3 class="text-xl font-bold text-pink-600">Nuevo Diplomado</h3>
                <button onclick="cerrarModal()" class="text-gray-400 hover:text-pink-500 text-3xl">&times;</button>
            </div>
            
            <form id="diplomaForm" class="p-8 space-y-6">
                <div>
                    <label class="block text-sm font-bold text-gray-700 mb-2">Nombre del Curso</label>
                    <input type="text" id="nombre" required placeholder="Ej. Masaje Terapéutico">
                </div>
                
                <div class="grid grid-cols-2 gap-4">
                    <div>
                        <label class="block text-sm font-bold text-gray-700 mb-2">Costo Mensual ($)</label>
                        <input type="number" id="costo" required placeholder="0.00">
                    </div>
                    <div>
                        <label class="block text-sm font-bold text-gray-700 mb-2">Duración</label>
                        <input type="text" id="duracion" required placeholder="Ej. 6 meses">
                    </div>
                </div>

                <button type="submit" class="w-full pink-gradient text-white py-4 rounded-2xl font-bold text-lg shadow-lg hover:opacity-90 transition-all">
                    Guardar Diplomado
                </button>
            </form>
        </div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-app.js";
        import { getFirestore, collection, addDoc, onSnapshot, query, serverTimestamp } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-firestore.js";
        import { getAuth, signInAnonymously, signInWithCustomToken, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-auth.js";

        // Firebase Configuration (Global variables injected by environment)
        const firebaseConfig = JSON.parse(__firebase_config);
        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);
        const auth = getAuth(app);
        const appId = typeof __app_id !== 'undefined' ? __app_id : 'gestor-de-diplomados';

        const grid = document.getElementById('diplomasGrid');
        const form = document.getElementById('diplomaForm');
        const statusMsg = document.getElementById('statusMsg');
        const btnNuevo = document.getElementById('btnNuevo');

        // IMPORTANT: Rules require this specific path structure
        const publicCollectionPath = ['artifacts', appId, 'public', 'data', 'diplomados'];

        // Auth Logic
        const initAuth = async () => {
            try {
                if (typeof __initial_auth_token !== 'undefined' && __initial_auth_token) {
                    await signInWithCustomToken(auth, __initial_auth_token);
                } else {
                    await signInAnonymously(auth);
                }
            } catch (error) {
                console.error("Auth Error:", error);
                statusMsg.innerText = "Error de autenticación.";
            }
        };

        onAuthStateChanged(auth, (user) => {
            if (user) {
                console.log("Sesión activa:", user.uid);
                btnNuevo.disabled = false;
                btnNuevo.classList.remove('opacity-50', 'cursor-not-allowed');
                statusMsg.innerText = "Cargando datos...";
                startListening();
            } else {
                initAuth();
            }
        });

        function startListening() {
            // Guard against unauthenticated queries
            if (!auth.currentUser) return;

            const collectionRef = collection(db, ...publicCollectionPath);
            // Simple query to avoid index requirements
            const q = query(collectionRef);
            
            onSnapshot(q, (snapshot) => {
                grid.innerHTML = '';
                if (snapshot.empty) {
                    grid.innerHTML = '<div class="col-span-full text-center py-20 text-gray-400 font-medium">Aún no hay diplomados registrados.</div>';
                    return;
                }
                
                // Sort in memory to avoid "missing index" errors
                const docs = [];
                snapshot.forEach(doc => docs.push({ id: doc.id, ...doc.data() }));
                docs.sort((a, b) => {
                    const dateA = a.fecha?.toMillis ? a.fecha.toMillis() : 0;
                    const dateB = b.fecha?.toMillis ? b.fecha.toMillis() : 0;
                    return dateB - dateA;
                });

                docs.forEach((item) => {
                    grid.innerHTML += `
                        <div class="bg-white p-6 rounded-3xl card-shadow border border-pink-50 hover:border-pink-300 transition-all">
                            <h4 class="text-xl font-bold text-gray-800 mb-2">${item.nombre || 'Sin nombre'}</h4>
                            <div class="flex items-baseline gap-1 mb-4">
                                <span class="text-2xl font-bold text-pink-500">$${item.costo || '0'}</span>
                                <span class="text-gray-400 text-sm">/mes</span>
                            </div>
                            <div class="flex items-center gap-2 text-sm text-gray-500 bg-pink-50/50 p-3 rounded-xl">
                                <span class="font-bold text-pink-400">Duración:</span> ${item.duracion || 'No definida'}
                            </div>
                        </div>
                    `;
                });
            }, (error) => {
                console.error("Firestore Error:", error);
                grid.innerHTML = `<div class="col-span-full text-center py-20 text-red-400 font-medium italic">Error al cargar datos. Verifica los permisos de la base de datos.</div>`;
            });
        }

        form.onsubmit = async (e) => {
            e.preventDefault();
            if (!auth.currentUser) return;

            const nombre = document.getElementById('nombre').value;
            const costo = document.getElementById('costo').value;
            const duracion = document.getElementById('duracion').value;

            try {
                const collectionRef = collection(db, ...publicCollectionPath);
                await addDoc(collectionRef, {
                    nombre,
                    costo,
                    duracion,
                    fecha: serverTimestamp(),
                    userId: auth.currentUser.uid
                });
                form.reset();
                cerrarModal();
            } catch (error) {
                console.error("Save Error:", error);
                alert("Error al guardar: Permisos insuficientes.");
            }
        };

        window.abrirModal = () => document.getElementById('modal').classList.remove('hidden');
        window.cerrarModal = () => document.getElementById('modal').classList.add('hidden');
    </script>
</body>
</html>
