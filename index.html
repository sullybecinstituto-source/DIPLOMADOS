<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Admin Panel | Sullybec Instituto</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700&display=swap" rel="stylesheet">
    <style>
        body { 
            font-family: 'Plus Jakarta Sans', sans-serif; 
            background-color: #fff5f7; 
            -webkit-tap-highlight-color: transparent;
        }
        .pink-gradient { 
            background: linear-gradient(135deg, #ff85a2 0%, #ff4d6d 100%); 
        }
        .card-shadow { 
            box-shadow: 0 10px 25px -5px rgba(255, 133, 162, 0.1), 0 8px 10px -6px rgba(255, 133, 162, 0.1); 
        }
        input {
            border: 1px solid #ffe4e9;
            border-radius: 12px;
            padding: 12px;
            width: 100%;
            outline: none;
            transition: all 0.3s;
            font-size: 16px; /* Evita zoom automático en iOS */
        }
        input:focus {
            border-color: #ff85a2;
            box-shadow: 0 0 0 3px rgba(255, 133, 162, 0.2);
        }
        /* Estilo para el botón flotante en móviles */
        @media (max-width: 640px) {
            .mobile-fab {
                position: fixed;
                bottom: 20px;
                right: 20px;
                width: 60px;
                height: 60px;
                border-radius: 50%;
                display: flex;
                align-items: center;
                justify-content: center;
                z-index: 90;
                box-shadow: 0 4px 15px rgba(255, 77, 109, 0.4);
            }
            .mobile-fab span:last-child {
                display: none;
            }
            .mobile-fab span:first-child {
                font-size: 30px;
                margin: 0;
            }
        }
    </style>
</head>
<body>
    <nav class="bg-white border-b border-pink-100 px-4 md:px-8 py-4 flex justify-between items-center sticky top-0 z-50">
        <div class="flex items-center gap-2 md:gap-3">
            <div class="w-8 h-8 md:w-10 md:h-10 pink-gradient rounded-full flex items-center justify-center text-white font-bold text-lg md:text-xl shadow-lg">s</div>
            <h1 class="text-lg md:text-2xl font-bold italic text-pink-500">Sullybec.Instituto</h1>
        </div>
    </nav>

    <main class="max-w-6xl mx-auto p-4 md:p-8">
        <div class="flex flex-col md:flex-row justify-between items-start md:items-center mb-8 gap-4">
            <div>
                <h2 class="text-2xl md:text-3xl font-bold text-gray-800">Panel de Control</h2>
                <p class="text-sm md:text-base text-gray-500">Listado de diplomados activos</p>
            </div>
            
            <button id="btnNuevo" onclick="abrirModal()" class="mobile-fab pink-gradient text-white px-6 py-3 md:px-8 md:py-4 rounded-2xl font-bold transition-all hover:scale-105 active:scale-95 flex items-center gap-2">
                <span class="text-xl">+</span>
                <span>Nuevo Diplomado</span>
            </button>
        </div>

        <!-- Grid adaptable: 1 col en móvil, 2 en tablet, 3 en desktop -->
        <div id="diplomasGrid" class="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-3 gap-4 md:gap-8">
            <div class="col-span-full text-center py-20 text-gray-400">
                <p id="statusMsg" class="animate-pulse">Conectando...</p>
            </div>
        </div>
    </main>

    <!-- Modal Formulario Adaptado -->
    <div id="modal" class="fixed inset-0 bg-black/60 backdrop-blur-sm hidden flex items-end sm:items-center justify-center z-[100] p-0 sm:p-4">
        <div class="bg-white rounded-t-3xl sm:rounded-3xl w-full max-w-md shadow-2xl overflow-hidden animate-in slide-in-from-bottom duration-300">
            <div class="p-5 border-b border-pink-50 flex justify-between items-center bg-pink-50/30">
                <h3 class="text-xl font-bold text-pink-600">Nuevo Diplomado</h3>
                <button onclick="cerrarModal()" class="text-gray-400 hover:text-pink-500 text-3xl p-2">&times;</button>
            </div>
            
            <form id="diplomaForm" class="p-6 md:p-8 space-y-5">
                <div>
                    <label class="block text-sm font-bold text-gray-700 mb-1">Nombre del Curso</label>
                    <input type="text" id="nombre" required placeholder="Ej. Masaje Terapéutico">
                </div>
                
                <div class="grid grid-cols-2 gap-4">
                    <div>
                        <label class="block text-sm font-bold text-gray-700 mb-1">Costo ($)</label>
                        <input type="number" id="costo" required placeholder="0.00">
                    </div>
                    <div>
                        <label class="block text-sm font-bold text-gray-700 mb-1">Duración</label>
                        <input type="text" id="duracion" required placeholder="Ej. 6 meses">
                    </div>
                </div>

                <button type="submit" class="w-full pink-gradient text-white py-4 rounded-2xl font-bold text-lg shadow-lg hover:opacity-90 active:scale-[0.98] transition-all mt-2">
                    Guardar
                </button>
                <div class="h-4 sm:hidden"></div> <!-- Espacio extra para móviles con barra inferior -->
            </form>
        </div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-app.js";
        import { getFirestore, collection, addDoc, onSnapshot, query, serverTimestamp } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-firestore.js";
        import { getAuth, signInAnonymously, signInWithCustomToken, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-auth.js";

        const firebaseConfig = JSON.parse(__firebase_config);
        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);
        const auth = getAuth(app);
        const appId = typeof __app_id !== 'undefined' ? __app_id : 'sullybec-admin';

        const grid = document.getElementById('diplomasGrid');
        const form = document.getElementById('diplomaForm');
        const statusMsg = document.getElementById('statusMsg');

        const publicCollectionPath = ['artifacts', appId, 'public', 'data', 'diplomados'];

        window.abrirModal = () => {
            document.getElementById('modal').classList.remove('hidden');
            document.body.style.overflow = 'hidden'; // Bloquea scroll fondo
        };
        window.cerrarModal = () => {
            document.getElementById('modal').classList.add('hidden');
            document.body.style.overflow = 'auto';
        };

        const initAuth = async () => {
            try {
                if (typeof __initial_auth_token !== 'undefined' && __initial_auth_token) {
                    await signInWithCustomToken(auth, __initial_auth_token);
                } else {
                    await signInAnonymously(auth);
                }
            } catch (error) {
                statusMsg.innerText = "Error de conexión.";
            }
        };

        onAuthStateChanged(auth, (user) => {
            if (user) {
                statusMsg.innerText = "Cargando...";
                startListening();
            } else {
                initAuth();
            }
        });

        function startListening() {
            if (!auth.currentUser) return;
            const collectionRef = collection(db, ...publicCollectionPath);
            const q = query(collectionRef);
            
            onSnapshot(q, (snapshot) => {
                grid.innerHTML = '';
                if (snapshot.empty) {
                    grid.innerHTML = '<div class="col-span-full text-center py-20 text-gray-400 font-medium">No hay diplomados aún.</div>';
                    return;
                }
                
                const docs = [];
                snapshot.forEach(doc => docs.push({ id: doc.id, ...doc.data() }));
                docs.sort((a, b) => (b.fecha?.toMillis() || 0) - (a.fecha?.toMillis() || 0));

                docs.forEach((item) => {
                    grid.innerHTML += `
                        <div class="bg-white p-5 md:p-6 rounded-3xl card-shadow border border-pink-50 flex flex-col justify-between hover:border-pink-300 transition-all">
                            <div>
                                <h4 class="text-lg md:text-xl font-bold text-gray-800 mb-2 leading-tight">${item.nombre || 'Sin título'}</h4>
                                <div class="flex items-baseline gap-1 mb-4">
                                    <span class="text-xl md:text-2xl font-bold text-pink-500">$${item.costo || '0'}</span>
                                    <span class="text-gray-400 text-xs md:text-sm">/mes</span>
                                </div>
                            </div>
                            <div class="flex items-center gap-2 text-xs md:text-sm text-gray-500 bg-pink-50/50 p-3 rounded-xl">
                                <span class="font-bold text-pink-400">Duración:</span> ${item.duracion || 'N/A'}
                            </div>
                        </div>
                    `;
                });
            }, (error) => {
                statusMsg.innerHTML = `<span class="text-red-400 text-sm">Error de permisos en la base de datos.</span>`;
            });
        }

        form.onsubmit = async (e) => {
            e.preventDefault();
            const btn = form.querySelector('button[type="submit"]');
            btn.disabled = true;
            btn.innerText = "Guardando...";

            try {
                const collectionRef = collection(db, ...publicCollectionPath);
                await addDoc(collectionRef, {
                    nombre: document.getElementById('nombre').value,
                    costo: document.getElementById('costo').value,
                    duracion: document.getElementById('duracion').value,
                    fecha: serverTimestamp(),
                    userId: auth.currentUser.uid
                });
                form.reset();
                cerrarModal();
            } catch (error) {
                alert("Error al guardar.");
            } finally {
                btn.disabled = false;
                btn.innerText = "Guardar";
            }
        };
    </script>
</body>
</html>
