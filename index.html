<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Admin | SullyBec Instituto</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Plus Jakarta Sans', sans-serif; background-color: #fff5f7; -webkit-tap-highlight-color: transparent; padding-bottom: 80px; }
        .pink-gradient { background: linear-gradient(135deg, #ff85a2 0%, #ff4d6d 100%); }
        .blue-gradient { background: linear-gradient(135deg, #60a5fa 0%, #3b82f6 100%); }
        .purple-gradient { background: linear-gradient(135deg, #a855f7 0%, #7e22ce 100%); }
        
        /* Navegación tipo Píldora para Móvil */
        .nav-container { background: #fee2e7; border-radius: 20px; padding: 4px; display: flex; gap: 4px; }
        .nav-btn { flex: 1; padding: 10px 5px; border-radius: 16px; font-weight: 700; font-size: 13px; transition: all 0.3s; color: #ff85a2; text-align: center; }
        .nav-btn.active { background: white; color: #ff4d6d; shadow: 0 4px 10px rgba(255, 77, 109, 0.2); }

        /* Calendario Multi-select */
        .calendar-grid { display: grid; grid-template-columns: repeat(7, 1fr); gap: 4px; }
        .calendar-day { aspect-ratio: 1; display: flex; align-items: center; justify-content: center; border-radius: 8px; font-size: 12px; cursor: pointer; border: 1px solid #f1f5f9; transition: all 0.2s; }
        .calendar-day.selected { background: #a855f7; color: white; border-color: #7e22ce; font-weight: bold; }
        .calendar-day.today { border-color: #ff4d6d; color: #ff4d6d; }
        .calendar-day:empty { visibility: hidden; }

        input, select, textarea { border: 1px solid #ffe4e9; border-radius: 14px; padding: 12px; width: 100%; outline: none; transition: all 0.3s; font-size: 16px; background: white; }
        label { display: block; font-size: 0.7rem; font-weight: 800; color: #94a3b8; margin-bottom: 6px; text-transform: uppercase; }

        @media (max-width: 640px) {
            .mobile-fab { position: fixed; bottom: 20px; right: 20px; width: 56px; height: 56px; border-radius: 50%; z-index: 999; display: flex; align-items: center; justify-content: center; box-shadow: 0 10px 20px rgba(255, 77, 109, 0.4); }
            .mobile-fab span:last-child { display: none; }
        }
    </style>
</head>
<body>
    <!-- Header mejorado -->
    <header class="bg-white/80 backdrop-blur-md sticky top-0 z-50 px-4 py-3 border-b border-pink-100 shadow-sm">
        <div class="max-w-6xl mx-auto flex flex-col gap-3">
            <div class="flex justify-between items-center">
                <div class="flex items-center gap-2">
                    <div class="w-8 h-8 pink-gradient rounded-xl flex items-center justify-center text-white font-bold shadow-sm text-sm">S</div>
                    <span class="font-bold text-pink-500 tracking-tight">SullyBec Admin</span>
                </div>
                <div id="status-dot" class="w-2 h-2 rounded-full bg-green-400"></div>
            </div>
            
            <!-- Selector Táctil -->
            <div class="nav-container">
                <button onclick="switchTab('diplomados')" id="tabDip" class="nav-btn active">Diplomados</button>
                <button onclick="switchTab('certificaciones')" id="tabCert" class="nav-btn">Certificados</button>
                <button onclick="switchTab('talleres')" id="tabTal" class="nav-btn">Talleres</button>
            </div>
        </div>
    </header>

    <main class="max-w-6xl mx-auto p-4 pt-6">
        <!-- SECCIÓN DIPLOMADOS -->
        <section id="sec-diplomados">
            <div class="flex justify-between items-center mb-6">
                <h2 class="text-xl font-extrabold text-gray-800">Diplomados</h2>
                <button onclick="abrirModal('diplomado')" class="mobile-fab pink-gradient text-white px-5 py-2.5 rounded-2xl font-bold shadow-md flex items-center gap-2 text-sm">
                    <span>+</span><span>Nuevo</span>
                </button>
            </div>
            <div id="diplomasGrid" class="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-3 gap-4"></div>
        </section>

        <!-- SECCIÓN CERTIFICACIONES -->
        <section id="sec-certificaciones" class="hidden">
            <div class="flex justify-between items-center mb-6">
                <h2 class="text-xl font-extrabold text-gray-800">Certificaciones</h2>
                <button onclick="abrirModal('certificacion')" class="mobile-fab blue-gradient text-white px-5 py-2.5 rounded-2xl font-bold shadow-md flex items-center gap-2 text-sm">
                    <span>+</span><span>Nueva</span>
                </button>
            </div>
            <div id="certGrid" class="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-3 gap-4"></div>
        </section>

        <!-- SECCIÓN TALLERES -->
        <section id="sec-talleres" class="hidden">
            <div class="flex justify-between items-center mb-6">
                <h2 class="text-xl font-extrabold text-gray-800">Talleres</h2>
                <button onclick="abrirModal('taller')" class="mobile-fab purple-gradient text-white px-5 py-2.5 rounded-2xl font-bold shadow-md flex items-center gap-2 text-sm">
                    <span>+</span><span>Nuevo</span>
                </button>
            </div>
            <div id="talleresGrid" class="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-3 gap-4"></div>
        </section>
    </main>

    <!-- MODAL TALLER (ACTUALIZADO) -->
    <div id="modal-taller" class="fixed inset-0 bg-black/60 backdrop-blur-sm hidden items-end sm:items-center justify-center z-[1000] p-0 sm:p-4 overflow-y-auto">
        <div class="bg-white rounded-t-[32px] sm:rounded-[32px] w-full max-w-lg shadow-2xl animate-in slide-in-from-bottom duration-300">
            <div class="p-6 border-b border-purple-50 flex justify-between items-center">
                <div>
                    <h3 id="talModalTitle" class="text-lg font-bold text-purple-600">Configurar Taller</h3>
                    <p class="text-[10px] text-gray-400 font-bold uppercase tracking-widest">Calculadora de inversión</p>
                </div>
                <button onclick="cerrarModal('taller')" class="w-10 h-10 bg-gray-100 rounded-full flex items-center justify-center text-gray-400 font-bold">&times;</button>
            </div>
            
            <form id="tallerForm" class="p-6 space-y-5">
                <input type="hidden" id="editIdTal">
                
                <div><label>Nombre del Taller</label><input type="text" id="nombreTal" placeholder="Ej. Automaquillaje" required></div>
                
                <!-- CALENDARIO MULTI-SELECT -->
                <div class="bg-purple-50/50 p-4 rounded-2xl border border-purple-100">
                    <label class="text-purple-600">Selecciona los días del taller</label>
                    <div id="calMonthName" class="text-center font-bold text-xs mb-2 text-gray-500 uppercase">Mayo 2025</div>
                    <div class="calendar-grid mb-2" id="calendarGrid">
                        <!-- Generado por JS -->
                    </div>
                    <div class="text-[10px] text-gray-500 italic mt-1">* Toca los días para agregarlos/quitarlos</div>
                </div>

                <div class="grid grid-cols-2 gap-4">
                    <div>
                        <label>Costo por Día ($)</label>
                        <input type="number" id="costoPorDiaTal" placeholder="0" oninput="recalcTaller()">
                    </div>
                    <div>
                        <label>Horas por Día</label>
                        <input type="text" id="horasTal" placeholder="Ej. 3h">
                    </div>
                </div>

                <div class="bg-purple-600 p-4 rounded-2xl flex justify-between items-center shadow-lg shadow-purple-100">
                    <div>
                        <div class="text-[10px] text-purple-200 font-bold uppercase">Inversión Final</div>
                        <div class="text-xs text-white opacity-80" id="talSummary">0 días seleccionados</div>
                    </div>
                    <div class="text-2xl font-black text-white" id="totalTallerDisplay">$0</div>
                    <input type="hidden" id="costoTal">
                </div>

                <div><label>Link Drive (Material)</label><input type="url" id="linkTal" placeholder="https://drive.google.com/..."></div>
                
                <div class="flex gap-3 pt-2">
                    <button type="submit" class="flex-1 purple-gradient text-white py-4 rounded-2xl font-bold shadow-lg shadow-purple-100">Guardar Taller</button>
                </div>
            </form>
        </div>
    </div>

    <!-- OTROS MODALES (Simplificados para brevedad pero funcionales) -->
    <div id="modal-diplomado" class="fixed inset-0 bg-black/60 backdrop-blur-sm hidden items-center justify-center z-[1000] p-4 overflow-y-auto">
        <div class="bg-white rounded-3xl w-full max-w-lg p-6">
            <h3 class="text-xl font-bold mb-4">Diplomado</h3>
            <form id="diplomaForm" class="space-y-4">
                <input type="hidden" id="editIdDip">
                <input type="text" id="nombreDip" placeholder="Nombre" required>
                <input type="text" id="duracionDip" placeholder="Duración">
                <input type="date" id="fechaInicioDip">
                <input type="number" id="inscripcionDip" placeholder="Costo Inscripción">
                <input type="number" id="descuentoDip" placeholder="Descuento %">
                <input type="number" id="claseDip" placeholder="Clase Individual">
                <input type="number" id="mesDip" placeholder="Mensualidad">
                <input type="number" id="totalDip" placeholder="Costo Total">
                <input type="number" id="certCostDip" placeholder="Extra Certificado">
                <input type="number" id="evalCostDip" placeholder="Extra Evaluación">
                <input type="url" id="linkDip" placeholder="Link Drive">
                <button type="submit" class="w-full pink-gradient text-white py-4 rounded-xl font-bold">Guardar</button>
                <button type="button" onclick="cerrarModal('diplomado')" class="w-full text-gray-400 py-2">Cerrar</button>
            </form>
        </div>
    </div>

    <div id="modal-certificacion" class="fixed inset-0 bg-black/60 backdrop-blur-sm hidden items-center justify-center z-[1000] p-4 overflow-y-auto">
        <div class="bg-white rounded-3xl w-full max-w-lg p-6">
            <h3 class="text-xl font-bold mb-4">Certificación</h3>
            <form id="certForm" class="space-y-4">
                <input type="hidden" id="editIdCert">
                <input type="text" id="nombreCert" placeholder="Estándar">
                <input type="number" id="costoCert" placeholder="Costo Certificado">
                <input type="number" id="evalCert" placeholder="Costo Evaluación">
                <input type="url" id="linkCert" placeholder="Link Drive">
                <button type="submit" class="w-full blue-gradient text-white py-4 rounded-xl font-bold">Guardar</button>
                <button type="button" onclick="cerrarModal('certificacion')" class="w-full text-gray-400 py-2">Cerrar</button>
            </form>
        </div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-app.js";
        import { getFirestore, collection, addDoc, onSnapshot, query, serverTimestamp, doc, updateDoc, deleteDoc } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-firestore.js";
        import { getAuth, signInAnonymously } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-auth.js";

        const firebaseConfig = JSON.parse('{"apiKey": "AIzaSyBv4oDOH5mPBN79m_Y47UYa9H1SJ1S7BL8","authDomain": "gestor-de-diplomados.firebaseapp.com","projectId": "gestor-de-diplomados","storageBucket": "gestor-de-diplomados.firebasestorage.app","messagingSenderId": "25065074693","appId": "1:25065074693:web:6541747c26543c709f2c6c"}');
        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);
        const auth = getAuth(app);
        const APP_ID = 'sullybec-admin';

        const colDip = collection(db, 'artifacts', APP_ID, 'public', 'data', 'diplomados');
        const colCert = collection(db, 'artifacts', APP_ID, 'public', 'data', 'certificaciones');
        const colTal = collection(db, 'artifacts', APP_ID, 'public', 'data', 'talleres');

        let dataDip = [], dataCert = [], dataTal = [];
        let selectedDates = [];

        // Inicialización
        const init = async () => {
            await signInAnonymously(auth);
            listenAll();
            buildCalendar();
        };

        const listenAll = () => {
            onSnapshot(colDip, snap => {
                dataDip = snap.docs.map(d => ({id: d.id, ...d.data()}));
                renderDip();
            });
            onSnapshot(colCert, snap => {
                dataCert = snap.docs.map(d => ({id: d.id, ...d.data()}));
                renderCert();
            });
            onSnapshot(colTal, snap => {
                dataTal = snap.docs.map(d => ({id: d.id, ...d.data()}));
                renderTal();
            });
        };

        // UI Helpers
        window.switchTab = (tab) => {
            const tabs = { diplomados: 'tabDip', certificaciones: 'tabCert', talleres: 'tabTal' };
            Object.keys(tabs).forEach(k => {
                document.getElementById(`sec-${k}`).classList.toggle('hidden', k !== tab);
                document.getElementById(tabs[k]).classList.toggle('active', k === tab);
            });
        };

        window.abrirModal = (tipo, id = null) => {
            document.getElementById(`modal-${tipo}`).style.display = 'flex';
            if(tipo === 'taller') {
                document.getElementById('tallerForm').reset();
                selectedDates = [];
                document.getElementById('editIdTal').value = id || '';
                if(id) {
                    const t = dataTal.find(x => x.id === id);
                    document.getElementById('nombreTal').value = t.nombre;
                    document.getElementById('costoPorDiaTal').value = t.costoPorDia || 0;
                    document.getElementById('horasTal').value = t.horasPorDia || '';
                    document.getElementById('linkTal').value = t.linkDrive || '';
                    selectedDates = t.fechasArray || [];
                }
                updateCalendarUI();
                recalcTaller();
            }
            // Lógica similar para Dip y Cert (simplificado)
            if(id && tipo === 'diplomado') {
                const d = dataDip.find(x => x.id === id);
                document.getElementById('editIdDip').value = d.id;
                document.getElementById('nombreDip').value = d.nombre;
                // ... llenar resto
            }
        };

        window.cerrarModal = (tipo) => document.getElementById(`modal-${tipo}`).style.display = 'none';

        // Lógica de Calendario
        function buildCalendar() {
            const grid = document.getElementById('calendarGrid');
            const now = new Date();
            const year = now.getFullYear();
            const month = now.getMonth();
            const monthNames = ["Enero", "Febrero", "Marzo", "Abril", "Mayo", "Junio", "Julio", "Agosto", "Septiembre", "Octubre", "Noviembre", "Diciembre"];
            
            document.getElementById('calMonthName').innerText = `${monthNames[month]} ${year}`;
            
            const firstDay = new Date(year, month, 1).getDay();
            const daysInMonth = new Date(year, month + 1, 0).getDate();
            
            grid.innerHTML = '';
            // Headers
            ['D','L','M','M','J','V','S'].forEach(d => {
                grid.innerHTML += `<div class="text-center font-bold text-[9px] text-gray-300 pb-1">${d}</div>`;
            });
            
            for(let i=0; i<firstDay; i++) grid.innerHTML += '<div></div>';
            
            for(let d=1; d<=daysInMonth; d++) {
                const dateStr = `${year}-${String(month+1).padStart(2,'0')}-${String(d).padStart(2,'0')}`;
                const isToday = d === now.getDate() ? 'today' : '';
                grid.innerHTML += `<div class="calendar-day ${isToday}" data-date="${dateStr}" onclick="toggleDate('${dateStr}')">${d}</div>`;
            }
        }

        window.toggleDate = (date) => {
            const idx = selectedDates.indexOf(date);
            if(idx > -1) selectedDates.splice(idx, 1);
            else selectedDates.push(date);
            updateCalendarUI();
            recalcTaller();
        };

        function updateCalendarUI() {
            document.querySelectorAll('.calendar-day').forEach(el => {
                el.classList.toggle('selected', selectedDates.includes(el.dataset.date));
            });
        }

        window.recalcTaller = () => {
            const costoDia = Number(document.getElementById('costoPorDiaTal').value) || 0;
            const numDias = selectedDates.length;
            const total = costoDia * numDias;
            
            document.getElementById('talSummary').innerText = `${numDias} día(s) seleccionados`;
            document.getElementById('totalTallerDisplay').innerText = `$${total.toLocaleString()}`;
            document.getElementById('costoTal').value = total;
        };

        // Render functions
        function renderTal() {
            const grid = document.getElementById('talleresGrid');
            grid.innerHTML = dataTal.map(t => `
                <div class="bg-white p-5 rounded-3xl border border-purple-50 shadow-sm">
                    <div class="flex justify-between items-start mb-1">
                        <h4 class="font-bold text-gray-800">${t.nombre}</h4>
                        <div class="flex gap-2">
                            <button onclick="abrirModal('taller', '${t.id}')" class="text-xs">✏️</button>
                            <button onclick="borrar('talleres', '${t.id}')" class="text-xs">🗑️</button>
                        </div>
                    </div>
                    <div class="text-[10px] font-bold text-purple-400 mb-3">${t.fechasArray?.length || 0} DÍAS • ${t.horasPorDia || '--'}</div>
                    <div class="text-xs text-gray-400 mb-3 line-clamp-1">${t.fechasArray?.join(', ') || 'Sin fechas'}</div>
                    <div class="bg-purple-50 p-3 rounded-2xl flex justify-between items-center">
                        <span class="text-xs font-bold text-purple-600">Total:</span>
                        <span class="text-xl font-black text-purple-700">$${Number(t.costo).toLocaleString()}</span>
                    </div>
                </div>
            `).join('');
        }

        function renderDip() {
            const grid = document.getElementById('diplomasGrid');
            grid.innerHTML = dataDip.map(d => `
                <div class="bg-white p-5 rounded-3xl border border-pink-50 shadow-sm relative">
                    <button onclick="borrar('diplomados', '${d.id}')" class="absolute top-4 right-4 text-xs opacity-20 hover:opacity-100">🗑️</button>
                    <h4 class="font-bold text-gray-800 mb-1">${d.nombre}</h4>
                    <p class="text-[10px] font-bold text-pink-400 uppercase mb-4">${d.duracion || 'Sin duración'}</p>
                    <div class="flex justify-between items-center bg-gray-50 p-3 rounded-2xl">
                         <span class="text-xs font-bold text-gray-400">Inscripción:</span>
                         <span class="font-bold text-pink-500">$${d.inscripcion || 0}</span>
                    </div>
                </div>
            `).join('');
        }

        function renderCert() {
            const grid = document.getElementById('certGrid');
            grid.innerHTML = dataCert.map(c => `
                <div class="bg-white p-5 rounded-3xl border border-blue-50 shadow-sm">
                    <h4 class="font-bold text-gray-800 mb-2">${c.nombre}</h4>
                    <div class="flex justify-between items-center">
                        <span class="text-xs font-bold text-blue-500">Costo Total:</span>
                        <span class="font-black text-blue-700">$${(Number(c.costoCert) + Number(c.costoEval)).toLocaleString()}</span>
                    </div>
                </div>
            `).join('');
        }

        window.borrar = async (col, id) => {
            if(confirm('¿Eliminar registro?')) {
                await deleteDoc(doc(db, 'artifacts', APP_ID, 'public', 'data', col, id));
            }
        };

        // Form Submits
        document.getElementById('tallerForm').onsubmit = async (e) => {
            e.preventDefault();
            const id = document.getElementById('editIdTal').value;
            const data = {
                nombre: document.getElementById('nombreTal').value,
                costoPorDia: Number(document.getElementById('costoPorDiaTal').value),
                horasPorDia: document.getElementById('horasTal').value,
                fechasArray: selectedDates,
                costo: Number(document.getElementById('costoTal').value),
                linkDrive: document.getElementById('linkTal').value,
                updated: serverTimestamp()
            };
            if(id) await updateDoc(doc(db, 'artifacts', APP_ID, 'public', 'data', 'talleres', id), data);
            else await addDoc(colTal, {...data, created: serverTimestamp()});
            cerrarModal('taller');
        };

        document.getElementById('diplomaForm').onsubmit = async (e) => {
            e.preventDefault();
            const id = document.getElementById('editIdDip').value;
            const data = {
                nombre: document.getElementById('nombreDip').value,
                duracion: document.getElementById('duracionDip').value,
                fechaInicio: document.getElementById('fechaInicioDip').value,
                inscripcion: Number(document.getElementById('inscripcionDip').value),
                descuento: Number(document.getElementById('descuentoDip').value),
                costoClase: Number(document.getElementById('claseDip').value),
                costoMes: Number(document.getElementById('mesDip').value),
                costoTotal: Number(document.getElementById('totalDip').value),
                costoCertExtra: Number(document.getElementById('certCostDip').value),
                costoEvalExtra: Number(document.getElementById('evalCostDip').value),
                temarioLink: document.getElementById('linkDip').value,
                updated: serverTimestamp()
            };
            if(id) await updateDoc(doc(db, 'artifacts', APP_ID, 'public', 'data', 'diplomados', id), data);
            else await addDoc(colDip, {...data, created: serverTimestamp()});
            cerrarModal('diplomado');
        };

        document.getElementById('certForm').onsubmit = async (e) => {
            e.preventDefault();
            const id = document.getElementById('editIdCert').value;
            const data = {
                nombre: document.getElementById('nombreCert').value,
                costoCert: Number(document.getElementById('costoCert').value),
                costoEval: Number(document.getElementById('evalCert').value),
                linkDrive: document.getElementById('linkCert').value,
                updated: serverTimestamp()
            };
            if(id) await updateDoc(doc(db, 'artifacts', APP_ID, 'public', 'data', 'certificaciones', id), data);
            else await addDoc(colCert, {...data, created: serverTimestamp()});
            cerrarModal('certificacion');
        };

        init();
    </script>
</body>
</html>
