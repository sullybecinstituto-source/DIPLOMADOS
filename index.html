<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Admin | SullyBec Instituto</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Plus Jakarta Sans', sans-serif; background-color: #fff5f7; -webkit-tap-highlight-color: transparent; padding-bottom: 80px; }
        .pink-gradient { background: linear-gradient(135deg, #ff85a2 0%, #ff4d6d 100%); }
        .blue-gradient { background: linear-gradient(135deg, #60a5fa 0%, #3b82f6 100%); }
        .purple-gradient { background: linear-gradient(135deg, #a855f7 0%, #7e22ce 100%); }
        
        .nav-container { background: #fee2e7; border-radius: 20px; padding: 4px; display: flex; gap: 4px; }
        .nav-btn { flex: 1; padding: 10px 5px; border-radius: 16px; font-weight: 700; font-size: 13px; transition: all 0.3s; color: #ff85a2; text-align: center; border: none; cursor: pointer; }
        .nav-btn.active { background: white; color: #ff4d6d; box-shadow: 0 4px 10px rgba(255, 77, 109, 0.1); }

        input, select, textarea { border: 1px solid #ffe4e9; border-radius: 14px; padding: 12px; width: 100%; outline: none; transition: all 0.3s; font-size: 16px; background: white; }
        input:focus { border-color: #ff85a2; box-shadow: 0 0 0 4px rgba(255, 133, 162, 0.1); }
        label { display: block; font-size: 0.7rem; font-weight: 800; color: #94a3b8; margin-bottom: 4px; text-transform: uppercase; margin-left: 4px; }

        .calendar-grid { display: grid; grid-template-columns: repeat(7, 1fr); gap: 4px; }
        .calendar-day { aspect-ratio: 1; display: flex; align-items: center; justify-content: center; border-radius: 8px; font-size: 12px; cursor: pointer; border: 1px solid #f1f5f9; transition: all 0.2s; }
        .calendar-day.selected { background: #a855f7; color: white; border-color: #7e22ce; font-weight: bold; }

        @media (max-width: 640px) {
            .mobile-fab { position: fixed; bottom: 20px; right: 20px; width: 56px; height: 56px; border-radius: 50%; z-index: 999; display: flex; align-items: center; justify-content: center; box-shadow: 0 10px 20px rgba(255, 77, 109, 0.4); }
        }
    </style>
</head>
<body>
    <header class="bg-white/80 backdrop-blur-md sticky top-0 z-50 px-4 py-3 border-b border-pink-100 shadow-sm">
        <div class="max-w-6xl mx-auto flex flex-col gap-3">
            <div class="flex justify-between items-center">
                <div class="flex items-center gap-2">
                    <div class="w-8 h-8 pink-gradient rounded-xl flex items-center justify-center text-white font-bold shadow-sm text-sm">S</div>
                    <span class="font-bold text-pink-500 tracking-tight">SullyBec Admin</span>
                </div>
                <div id="status-dot" class="w-2 h-2 rounded-full bg-yellow-400"></div>
            </div>
            
            <div class="nav-container">
                <button onclick="switchTab('diplomados')" id="tabDip" class="nav-btn active">Diplomados</button>
                <button onclick="switchTab('certificaciones')" id="tabCert" class="nav-btn">Certificados</button>
                <button onclick="switchTab('talleres')" id="tabTal" class="nav-btn">Talleres</button>
            </div>
        </div>
    </header>

    <main class="max-w-6xl mx-auto p-4 pt-6">
        <section id="sec-diplomados">
            <div class="flex justify-between items-center mb-6">
                <h2 class="text-xl font-extrabold text-gray-800">Diplomados</h2>
                <button onclick="abrirModal('diplomado')" class="mobile-fab pink-gradient text-white px-5 py-2.5 rounded-2xl font-bold shadow-md flex items-center gap-2 text-sm">
                    <span>+</span><span class="hidden sm:inline">Nuevo</span>
                </button>
            </div>
            <div id="diplomasGrid" class="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-3 gap-4"></div>
        </section>

        <section id="sec-certificaciones" class="hidden">
            <div class="flex justify-between items-center mb-6">
                <h2 class="text-xl font-extrabold text-gray-800">Certificaciones</h2>
                <button onclick="abrirModal('certificacion')" class="mobile-fab blue-gradient text-white px-5 py-2.5 rounded-2xl font-bold shadow-md flex items-center gap-2 text-sm">
                    <span>+</span><span class="hidden sm:inline">Nueva</span>
                </button>
            </div>
            <div id="certGrid" class="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-3 gap-4"></div>
        </section>

        <section id="sec-talleres" class="hidden">
            <div class="flex justify-between items-center mb-6">
                <h2 class="text-xl font-extrabold text-gray-800">Talleres</h2>
                <button onclick="abrirModal('taller')" class="mobile-fab purple-gradient text-white px-5 py-2.5 rounded-2xl font-bold shadow-md flex items-center gap-2 text-sm">
                    <span>+</span><span class="hidden sm:inline">Nuevo</span>
                </button>
            </div>
            <div id="talleresGrid" class="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-3 gap-4"></div>
        </section>
    </main>

    <!-- Modales -->
    <div id="modal-diplomado" class="fixed inset-0 bg-black/60 backdrop-blur-sm hidden items-end sm:items-center justify-center z-[1000] p-0 sm:p-4 overflow-y-auto">
        <div class="bg-white rounded-t-[32px] sm:rounded-[32px] w-full max-w-2xl shadow-2xl">
            <div class="p-6 border-b border-pink-50 flex justify-between items-center">
                <h3 class="text-lg font-bold text-pink-600">Configuración del Diplomado</h3>
                <button onclick="cerrarModal('diplomado')" class="w-10 h-10 bg-gray-100 rounded-full flex items-center justify-center text-gray-400 font-bold">&times;</button>
            </div>
            <form id="diplomadoForm" class="p-6 space-y-4">
                <input type="hidden" id="editIdDip">
                <div><label>Nombre del Diplomado</label><input type="text" id="nombreDip" required></div>
                <div class="grid grid-cols-2 sm:grid-cols-3 gap-3">
                    <div><label>Duración</label><input type="text" id="duracionDip" placeholder="6 meses"></div>
                    <div><label>Fecha Inicio</label><input type="date" id="fechaInicioDip"></div>
                    <div class="col-span-2 sm:col-span-1"><label>Horario</label><input type="text" id="horarioDip" placeholder="Sábados 9-2"></div>
                </div>
                <div class="bg-pink-50/50 p-4 rounded-2xl border border-pink-100">
                    <div class="flex justify-between items-center mb-4">
                        <span class="text-xs font-bold text-pink-600 uppercase">Costos y Descuentos</span>
                        <div class="w-24"><label>Desc. %</label><input type="number" id="descuentoDip" value="0" oninput="recalcDiplomado()" class="py-1 px-2 text-center font-bold"></div>
                    </div>
                    <div class="grid grid-cols-1 sm:grid-cols-3 gap-4">
                        <div class="space-y-1">
                            <label>Clase Individual</label>
                            <input type="number" id="claseDip" oninput="recalcDiplomado()" placeholder="0">
                            <div class="text-[10px] text-pink-400 font-bold px-1" id="resClase">Con desc: $0</div>
                        </div>
                        <div class="space-y-1">
                            <label>Mensualidad</label>
                            <input type="number" id="mesDip" oninput="recalcDiplomado()" placeholder="0">
                            <div class="text-[10px] text-pink-400 font-bold px-1" id="resMes">Con desc: $0</div>
                        </div>
                        <div class="space-y-1">
                            <label>Pago Total</label>
                            <input type="number" id="totalDip" oninput="recalcDiplomado()" placeholder="0">
                            <div class="text-[10px] text-pink-400 font-bold px-1" id="resTotal">Con desc: $0</div>
                        </div>
                    </div>
                </div>
                <div class="grid grid-cols-2 gap-4">
                    <div><label>Inscripción ($)</label><input type="number" id="inscripcionDip" placeholder="0"></div>
                    <div><label>Documentación Final ($)</label><input type="number" id="docuDip" placeholder="0"></div>
                </div>
                <div><label>Link Temario</label><input type="url" id="linkDip" placeholder="https://drive.google.com/..."></div>
                <button type="submit" class="w-full pink-gradient text-white py-4 rounded-2xl font-bold shadow-lg mt-2">Guardar Cambios</button>
            </form>
        </div>
    </div>

    <div id="modal-certificacion" class="fixed inset-0 bg-black/60 backdrop-blur-sm hidden items-end sm:items-center justify-center z-[1000] p-0 sm:p-4">
        <div class="bg-white rounded-t-[32px] sm:rounded-[32px] w-full max-w-lg shadow-2xl">
            <div class="p-6 border-b border-blue-50 flex justify-between items-center">
                <h3 class="text-lg font-bold text-blue-600">Datos Certificación</h3>
                <button onclick="cerrarModal('certificacion')" class="w-10 h-10 bg-gray-100 rounded-full flex items-center justify-center text-gray-400 font-bold">&times;</button>
            </div>
            <form id="certificacionForm" class="p-6 space-y-4">
                <input type="hidden" id="editIdCert">
                <div><label>Nombre Estándar</label><input type="text" id="nombreCert" required></div>
                <div class="grid grid-cols-2 gap-3">
                    <div><label>Costo Certificado</label><input type="number" id="costoCert" placeholder="0"></div>
                    <div><label>Costo Evaluación</label><input type="number" id="evalCert" placeholder="0"></div>
                </div>
                <div><label>Link Drive</label><input type="url" id="linkCert"></div>
                <button type="submit" class="w-full blue-gradient text-white py-4 rounded-2xl font-bold shadow-lg">Guardar Certificación</button>
            </form>
        </div>
    </div>

    <div id="modal-taller" class="fixed inset-0 bg-black/60 backdrop-blur-sm hidden items-end sm:items-center justify-center z-[1000] p-0 sm:p-4 overflow-y-auto">
        <div class="bg-white rounded-t-[32px] sm:rounded-[32px] w-full max-w-lg shadow-2xl">
            <div class="p-6 border-b border-purple-50 flex justify-between items-center">
                <h3 class="text-lg font-bold text-purple-600">Configurar Taller</h3>
                <button onclick="cerrarModal('taller')" class="w-10 h-10 bg-gray-100 rounded-full flex items-center justify-center text-gray-400 font-bold">&times;</button>
            </div>
            <form id="tallerForm" class="p-6 space-y-4">
                <input type="hidden" id="editIdTal">
                <div><label>Nombre del Taller</label><input type="text" id="nombreTal" required></div>
                <div class="bg-purple-50/50 p-4 rounded-2xl border border-purple-100">
                    <div id="calMonthName" class="text-center font-bold text-xs mb-2 text-gray-500 uppercase">Mayo 2025</div>
                    <div class="calendar-grid mb-2" id="calendarGrid"></div>
                </div>
                <div class="grid grid-cols-2 gap-3">
                    <div><label>Costo por Día ($)</label><input type="number" id="costoPorDiaTal" oninput="recalcTaller()"></div>
                    <div><label>Horas / Horario</label><input type="text" id="horarioTal" placeholder="4pm a 7pm"></div>
                </div>
                <div class="bg-purple-600 p-4 rounded-2xl flex justify-between items-center text-white">
                    <div class="text-xs font-bold uppercase" id="talSummary">0 días</div>
                    <div class="text-2xl font-black" id="totalTallerDisplay">$0</div>
                </div>
                <button type="submit" class="w-full purple-gradient text-white py-4 rounded-2xl font-bold shadow-lg">Guardar Taller</button>
            </form>
        </div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-app.js";
        import { getFirestore, collection, addDoc, onSnapshot, serverTimestamp, doc, updateDoc, deleteDoc } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-firestore.js";
        import { getAuth, signInAnonymously, onAuthStateChanged, signInWithCustomToken } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-auth.js";

        const firebaseConfig = JSON.parse('{"apiKey": "AIzaSyBv4oDOH5mPBN79m_Y47UYa9H1SJ1S7BL8","authDomain": "gestor-de-diplomados.firebaseapp.com","projectId": "gestor-de-diplomados","storageBucket": "gestor-de-diplomados.firebasestorage.app","messagingSenderId": "25065074693","appId": "1:25065074693:web:6541747c26543c709f2c6c"}');
        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);
        const auth = getAuth(app);
        
        // CORRECCIÓN: Usar el ID original 'sullybec-admin' para recuperar los datos
        const APP_ID = 'sullybec-admin';

        let dataDip = [], dataCert = [], dataTal = [];
        let selectedDates = [];
        let subscriptions = [];

        const runAuthFlow = async () => {
            onAuthStateChanged(auth, (u) => {
                if (u) {
                    document.getElementById('status-dot').className = "w-2 h-2 rounded-full bg-green-400";
                    subscriptions.forEach(unsub => unsub());
                    subscriptions = [];
                    setTimeout(() => startDataSubscriptions(), 300);
                    buildCalendar();
                } else {
                    document.getElementById('status-dot').className = "w-2 h-2 rounded-full bg-yellow-400";
                }
            });

            try {
                const token = typeof __initial_auth_token !== 'undefined' ? __initial_auth_token : null;
                if (token) {
                    await signInWithCustomToken(auth, token).catch(async () => {
                        await signInAnonymously(auth);
                    });
                } else {
                    await signInAnonymously(auth);
                }
            } catch (err) {
                try { await signInAnonymously(auth); } catch(e) {}
            }
        };

        function startDataSubscriptions() {
            if (!auth.currentUser) return;
            const path = (coll) => collection(db, 'artifacts', APP_ID, 'public', 'data', coll);

            subscriptions.push(onSnapshot(path('diplomados'), snap => {
                dataDip = snap.docs.map(d => ({ id: d.id, ...d.data() }));
                renderDip();
            }, e => console.error("Error Dip:", e)));

            subscriptions.push(onSnapshot(path('certificaciones'), snap => {
                dataCert = snap.docs.map(d => ({ id: d.id, ...d.data() }));
                renderCert();
            }, e => console.error("Error Cert:", e)));

            subscriptions.push(onSnapshot(path('talleres'), snap => {
                dataTal = snap.docs.map(d => ({ id: d.id, ...d.data() }));
                renderTal();
            }, e => console.error("Error Tal:", e)));
        }

        runAuthFlow();

        // UI Handlers
        window.switchTab = (tab) => {
            ['diplomados', 'certificaciones', 'talleres'].forEach(k => {
                const section = document.getElementById(`sec-${k}`);
                if(section) section.classList.toggle('hidden', k !== tab);
            });
            document.getElementById('tabDip').classList.toggle('active', tab === 'diplomados');
            document.getElementById('tabCert').classList.toggle('active', tab === 'certificaciones');
            document.getElementById('tabTal').classList.toggle('active', tab === 'talleres');
        };

        window.recalcDiplomado = () => {
            const desc = Number(document.getElementById('descuentoDip').value) || 0;
            const vals = {
                clase: Number(document.getElementById('claseDip').value) || 0,
                mes: Number(document.getElementById('mesDip').value) || 0,
                total: Number(document.getElementById('totalDip').value) || 0
            };
            const apply = (val) => Math.max(0, val - (val * (desc / 100))).toLocaleString();
            document.getElementById('resClase').innerText = `Con desc: $${apply(vals.clase)}`;
            document.getElementById('resMes').innerText = `Con desc: $${apply(vals.mes)}`;
            document.getElementById('resTotal').innerText = `Con desc: $${apply(vals.total)}`;
        };

        window.abrirModal = (tipo, id = null) => {
            const modal = document.getElementById(`modal-${tipo}`);
            if(!modal) return;
            modal.style.display = 'flex';
            const form = document.getElementById(`${tipo}Form`);
            form.reset();
            const editIdInput = document.getElementById(`editId${tipo === 'diplomado' ? 'Dip' : tipo === 'certificacion' ? 'Cert' : 'Tal'}`);
            if(editIdInput) editIdInput.value = id || '';

            if (tipo === 'diplomado' && id) {
                const d = dataDip.find(x => x.id === id);
                if (d) {
                    document.getElementById('nombreDip').value = d.nombre || '';
                    document.getElementById('duracionDip').value = d.duracion || '';
                    document.getElementById('fechaInicioDip').value = d.fechaInicio || '';
                    document.getElementById('horarioDip').value = d.horario || '';
                    document.getElementById('claseDip').value = d.clase || 0;
                    document.getElementById('mesDip').value = d.mes || 0;
                    document.getElementById('totalDip').value = d.total || 0;
                    document.getElementById('descuentoDip').value = d.descuento || 0;
                    document.getElementById('inscripcionDip').value = d.inscripcion || 0;
                    document.getElementById('docuDip').value = d.documentacion || 0;
                    document.getElementById('linkDip').value = d.link || '';
                }
                recalcDiplomado();
            } else if (tipo === 'taller') {
                selectedDates = [];
                if (id) {
                    const t = dataTal.find(x => x.id === id);
                    if (t) {
                        document.getElementById('nombreTal').value = t.nombre || '';
                        document.getElementById('costoPorDiaTal').value = t.costoDia || 0;
                        document.getElementById('horarioTal').value = t.horario || '';
                        selectedDates = t.fechas || [];
                    }
                }
                updateCalendarUI(); recalcTaller();
            } else if (tipo === 'certificacion' && id) {
                const c = dataCert.find(x => x.id === id);
                if (c) {
                    document.getElementById('nombreCert').value = c.nombre || '';
                    document.getElementById('costoCert').value = c.costoCert || 0;
                    document.getElementById('evalCert').value = c.costoEval || 0;
                    document.getElementById('linkCert').value = c.link || '';
                }
            }
        };

        window.cerrarModal = (tipo) => { document.getElementById(`modal-${tipo}`).style.display = 'none'; };

        function renderDip() {
            const grid = document.getElementById('diplomasGrid');
            grid.innerHTML = dataDip.map(d => {
                const totalConDesc = d.total - (d.total * ((d.descuento || 0) / 100));
                return `
                <div class="bg-white p-5 rounded-3xl border border-pink-50 shadow-sm relative">
                    <div class="flex justify-between items-start mb-2">
                        <h4 class="font-bold text-gray-800">${d.nombre}</h4>
                        <div class="flex gap-1">
                            <button onclick="abrirModal('diplomado', '${d.id}')" class="text-xs p-1">✏️</button>
                            <button onclick="borrar('diplomados', '${d.id}')" class="text-xs p-1 opacity-20">🗑️</button>
                        </div>
                    </div>
                    <div class="text-[10px] text-pink-500 font-bold mb-4 uppercase">${d.duracion || '6 meses'} • ${d.horario || 'S/H'}</div>
                    <div class="flex justify-between text-xs border-t pt-3 border-pink-50">
                        <span class="text-gray-400 font-medium">Costo Final:</span>
                        <span class="font-black text-pink-600">$${totalConDesc.toLocaleString()}</span>
                    </div>
                </div>`;
            }).join('');
        }

        function renderCert() {
            const grid = document.getElementById('certGrid');
            grid.innerHTML = dataCert.map(c => `
                <div class="bg-white p-5 rounded-3xl border border-blue-50 shadow-sm">
                    <div class="flex justify-between items-start mb-3">
                        <h4 class="font-bold text-gray-800">${c.nombre}</h4>
                        <button onclick="abrirModal('certificacion', '${c.id}')" class="text-xs">✏️</button>
                    </div>
                    <div class="text-2xl font-black text-blue-600">$${(Number(c.costoCert || 0) + Number(c.costoEval || 0)).toLocaleString()}</div>
                </div>`).join('');
        }

        function renderTal() {
            const grid = document.getElementById('talleresGrid');
            grid.innerHTML = dataTal.map(t => `
                <div class="bg-white p-5 rounded-3xl border border-purple-50 shadow-sm">
                    <div class="flex justify-between items-start mb-2">
                        <h4 class="font-bold text-gray-800">${t.nombre}</h4>
                        <button onclick="abrirModal('taller', '${t.id}')" class="text-xs">✏️</button>
                    </div>
                    <div class="text-xl font-black text-purple-600">$${Number(t.costo || 0).toLocaleString()}</div>
                </div>`).join('');
        }

        window.borrar = async (col, id) => {
            if (!auth.currentUser || !confirm('¿Borrar?')) return;
            await deleteDoc(doc(db, 'artifacts', APP_ID, 'public', 'data', col, id));
        };

        document.getElementById('diplomadoForm').onsubmit = async (e) => {
            e.preventDefault();
            const id = document.getElementById('editIdDip').value;
            const payload = {
                nombre: document.getElementById('nombreDip').value,
                duracion: document.getElementById('duracionDip').value,
                fechaInicio: document.getElementById('fechaInicioDip').value,
                horario: document.getElementById('horarioDip').value,
                clase: Number(document.getElementById('claseDip').value),
                mes: Number(document.getElementById('mesDip').value),
                total: Number(document.getElementById('totalDip').value),
                descuento: Number(document.getElementById('descuentoDip').value),
                inscripcion: Number(document.getElementById('inscripcionDip').value),
                documentacion: Number(document.getElementById('docuDip').value),
                link: document.getElementById('linkDip').value,
                updated: serverTimestamp()
            };
            if (id) await updateDoc(doc(db, 'artifacts', APP_ID, 'public', 'data', 'diplomados', id), payload);
            else await addDoc(collection(db, 'artifacts', APP_ID, 'public', 'data', 'diplomados'), payload);
            cerrarModal('diplomado');
        };

        document.getElementById('tallerForm').onsubmit = async (e) => {
            e.preventDefault();
            const id = document.getElementById('editIdTal').value;
            const cost = (Number(document.getElementById('costoPorDiaTal').value) || 0) * selectedDates.length;
            const payload = {
                nombre: document.getElementById('nombreTal').value,
                costoDia: Number(document.getElementById('costoPorDiaTal').value),
                horario: document.getElementById('horarioTal').value,
                fechas: selectedDates,
                costo: cost,
                updated: serverTimestamp()
            };
            if (id) await updateDoc(doc(db, 'artifacts', APP_ID, 'public', 'data', 'talleres', id), payload);
            else await addDoc(collection(db, 'artifacts', APP_ID, 'public', 'data', 'talleres'), payload);
            cerrarModal('taller');
        };

        document.getElementById('certificacionForm').onsubmit = async (e) => {
            e.preventDefault();
            const id = document.getElementById('editIdCert').value;
            const payload = {
                nombre: document.getElementById('nombreCert').value,
                costoCert: Number(document.getElementById('costoCert').value),
                costoEval: Number(document.getElementById('evalCert').value),
                link: document.getElementById('linkCert').value,
                updated: serverTimestamp()
            };
            if (id) await updateDoc(doc(db, 'artifacts', APP_ID, 'public', 'data', 'certificaciones', id), payload);
            else await addDoc(collection(db, 'artifacts', APP_ID, 'public', 'data', 'certificaciones'), payload);
            cerrarModal('certificacion');
        };

        function buildCalendar() {
            const grid = document.getElementById('calendarGrid');
            const days = new Date(2025, 5, 0).getDate(); 
            grid.innerHTML = '';
            for (let i = 1; i <= days; i++) {
                const date = `2025-05-${String(i).padStart(2, '0')}`;
                const div = document.createElement('div');
                div.className = 'calendar-day';
                div.dataset.date = date;
                div.innerText = i;
                div.onclick = () => {
                    const idx = selectedDates.indexOf(date);
                    if (idx > -1) selectedDates.splice(idx, 1); else selectedDates.push(date);
                    updateCalendarUI(); recalcTaller();
                };
                grid.appendChild(div);
            }
        }
        function updateCalendarUI() { document.querySelectorAll('.calendar-day').forEach(el => el.classList.toggle('selected', selectedDates.includes(el.dataset.date))); }
        window.recalcTaller = () => {
            const total = (Number(document.getElementById('costoPorDiaTal').value) || 0) * selectedDates.length;
            document.getElementById('talSummary').innerText = `${selectedDates.length} días`;
            document.getElementById('totalTallerDisplay').innerText = `$${total.toLocaleString()}`;
        };
    </script>
</body>
</html>
