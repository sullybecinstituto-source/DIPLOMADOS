<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Admin | SullyBec Instituto</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Plus Jakarta Sans', sans-serif; background-color: #fff5f7; -webkit-tap-highlight-color: transparent; padding-bottom: 80px; }
        .pink-gradient { background: linear-gradient(135deg, #ff85a2 0%, #ff4d6d 100%); }
        .blue-gradient { background: linear-gradient(135deg, #60a5fa 0%, #3b82f6 100%); }
        .purple-gradient { background: linear-gradient(135deg, #a855f7 0%, #7e22ce 100%); }
        
        .nav-container { background: #fee2e7; border-radius: 20px; padding: 4px; display: flex; gap: 4px; }
        .nav-btn { flex: 1; padding: 10px 5px; border-radius: 16px; font-weight: 700; font-size: 13px; transition: all 0.3s; color: #ff85a2; text-align: center; }
        .nav-btn.active { background: white; color: #ff4d6d; box-shadow: 0 4px 10px rgba(255, 77, 109, 0.1); }

        .calendar-grid { display: grid; grid-template-columns: repeat(7, 1fr); gap: 4px; }
        .calendar-day { aspect-ratio: 1; display: flex; align-items: center; justify-content: center; border-radius: 8px; font-size: 12px; cursor: pointer; border: 1px solid #f1f5f9; transition: all 0.2s; }
        .calendar-day.selected { background: #a855f7; color: white; border-color: #7e22ce; font-weight: bold; }
        .calendar-day:empty { visibility: hidden; }

        input, select, textarea { border: 1px solid #ffe4e9; border-radius: 14px; padding: 12px; width: 100%; outline: none; transition: all 0.3s; font-size: 16px; background: white; }
        input:focus { border-color: #ff85a2; ring: 2px ring-pink-100; }
        label { display: block; font-size: 0.7rem; font-weight: 800; color: #94a3b8; margin-bottom: 4px; text-transform: uppercase; margin-left: 4px; }

        @media (max-width: 640px) {
            .mobile-fab { position: fixed; bottom: 20px; right: 20px; width: 56px; height: 56px; border-radius: 50%; z-index: 999; display: flex; align-items: center; justify-content: center; box-shadow: 0 10px 20px rgba(255, 77, 109, 0.4); }
        }
    </style>
</head>
<body>
    <header class="bg-white/80 backdrop-blur-md sticky top-0 z-50 px-4 py-3 border-b border-pink-100 shadow-sm">
        <div class="max-w-6xl mx-auto flex flex-col gap-3">
            <div class="flex justify-between items-center">
                <div class="flex items-center gap-2">
                    <div class="w-8 h-8 pink-gradient rounded-xl flex items-center justify-center text-white font-bold shadow-sm text-sm">S</div>
                    <span class="font-bold text-pink-500 tracking-tight">SullyBec Admin</span>
                </div>
                <div id="status-dot" class="w-2 h-2 rounded-full bg-green-400"></div>
            </div>
            
            <div class="nav-container">
                <button onclick="switchTab('diplomados')" id="tabDip" class="nav-btn active">Diplomados</button>
                <button onclick="switchTab('certificaciones')" id="tabCert" class="nav-btn">Certificados</button>
                <button onclick="switchTab('talleres')" id="tabTal" class="nav-btn">Talleres</button>
            </div>
        </div>
    </header>

    <main class="max-w-6xl mx-auto p-4 pt-6">
        <!-- SECCIÓN DIPLOMADOS -->
        <section id="sec-diplomados">
            <div class="flex justify-between items-center mb-6">
                <h2 class="text-xl font-extrabold text-gray-800">Diplomados</h2>
                <button onclick="abrirModal('diplomado')" class="mobile-fab pink-gradient text-white px-5 py-2.5 rounded-2xl font-bold shadow-md flex items-center gap-2 text-sm">
                    <span>+</span><span class="hidden sm:inline">Nuevo</span>
                </button>
            </div>
            <div id="diplomasGrid" class="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-3 gap-4"></div>
        </section>

        <!-- SECCIÓN CERTIFICACIONES -->
        <section id="sec-certificaciones" class="hidden">
            <div class="flex justify-between items-center mb-6">
                <h2 class="text-xl font-extrabold text-gray-800">Certificaciones</h2>
                <button onclick="abrirModal('certificacion')" class="mobile-fab blue-gradient text-white px-5 py-2.5 rounded-2xl font-bold shadow-md flex items-center gap-2 text-sm">
                    <span>+</span><span class="hidden sm:inline">Nueva</span>
                </button>
            </div>
            <div id="certGrid" class="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-3 gap-4"></div>
        </section>

        <!-- SECCIÓN TALLERES -->
        <section id="sec-talleres" class="hidden">
            <div class="flex justify-between items-center mb-6">
                <h2 class="text-xl font-extrabold text-gray-800">Talleres</h2>
                <button onclick="abrirModal('taller')" class="mobile-fab purple-gradient text-white px-5 py-2.5 rounded-2xl font-bold shadow-md flex items-center gap-2 text-sm">
                    <span>+</span><span class="hidden sm:inline">Nuevo</span>
                </button>
            </div>
            <div id="talleresGrid" class="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-3 gap-4"></div>
        </section>
    </main>

    <!-- MODAL DIPLOMADO -->
    <div id="modal-diplomado" class="fixed inset-0 bg-black/60 backdrop-blur-sm hidden items-end sm:items-center justify-center z-[1000] p-0 sm:p-4 overflow-y-auto">
        <div class="bg-white rounded-t-[32px] sm:rounded-[32px] w-full max-w-xl shadow-2xl">
            <div class="p-6 border-b border-pink-50 flex justify-between items-center">
                <h3 id="dipModalTitle" class="text-lg font-bold text-pink-600">Datos del Diplomado</h3>
                <button onclick="cerrarModal('diplomado')" class="w-10 h-10 bg-gray-100 rounded-full flex items-center justify-center text-gray-400 font-bold">&times;</button>
            </div>
            <form id="diplomadoForm" class="p-6 space-y-4">
                <input type="hidden" id="editIdDip">
                <div><label>Nombre</label><input type="text" id="nombreDip" placeholder="Nombre del Diplomado" required></div>
                <div class="grid grid-cols-2 gap-3">
                    <div><label>Duración</label><input type="text" id="duracionDip" placeholder="Ej. 6 meses"></div>
                    <div><label>Fecha Inicio</label><input type="date" id="fechaInicioDip"></div>
                </div>
                <!-- CAMPO HORARIO DIPLOMADO -->
                <div><label>Horario</label><input type="text" id="horarioDip" placeholder="Ej. Sábados 9am a 2pm"></div>
                
                <div class="bg-pink-50/50 p-4 rounded-2xl space-y-3">
                    <div class="grid grid-cols-2 gap-3">
                        <div><label>Inversión Base ($)</label><input type="number" id="totalDip" oninput="recalcDiplomado()" placeholder="Total sin descuento" required></div>
                        <div><label>Descuento (%)</label><input type="number" id="descuentoDip" oninput="recalcDiplomado()" placeholder="0"></div>
                    </div>
                    <div class="flex justify-between items-center pt-2">
                        <div>
                            <span class="text-[10px] font-bold text-pink-400 uppercase">Precio con descuento:</span>
                            <div class="text-xl font-black text-pink-600" id="finalPriceDip">$0</div>
                        </div>
                        <div class="text-right">
                            <span class="text-[10px] font-bold text-gray-400 uppercase">Ahorro:</span>
                            <div class="text-sm font-bold text-green-500" id="savingsDip">$0</div>
                        </div>
                    </div>
                </div>

                <div class="grid grid-cols-3 gap-3">
                    <div><label>Inscripción</label><input type="number" id="inscripcionDip" placeholder="0"></div>
                    <div><label>Mensualidad</label><input type="number" id="mesDip" placeholder="0"></div>
                    <div><label>Clase Indiv.</label><input type="number" id="claseDip" placeholder="0"></div>
                </div>
                
                <div><label>Link Drive (Temario)</label><input type="url" id="linkDip" placeholder="https://..."></div>
                <button type="submit" class="w-full pink-gradient text-white py-4 rounded-2xl font-bold shadow-lg mt-2">Guardar Diplomado</button>
            </form>
        </div>
    </div>

    <!-- MODAL CERTIFICACIÓN -->
    <div id="modal-certificacion" class="fixed inset-0 bg-black/60 backdrop-blur-sm hidden items-end sm:items-center justify-center z-[1000] p-0 sm:p-4">
        <div class="bg-white rounded-t-[32px] sm:rounded-[32px] w-full max-w-lg shadow-2xl">
            <div class="p-6 border-b border-blue-50 flex justify-between items-center">
                <h3 class="text-lg font-bold text-blue-600">Datos Certificación</h3>
                <button onclick="cerrarModal('certificacion')" class="w-10 h-10 bg-gray-100 rounded-full flex items-center justify-center text-gray-400 font-bold">&times;</button>
            </div>
            <form id="certificacionForm" class="p-6 space-y-4">
                <input type="hidden" id="editIdCert">
                <div><label>Nombre Estándar</label><input type="text" id="nombreCert" placeholder="Ej. EC0301" required></div>
                <div class="grid grid-cols-2 gap-3">
                    <div><label>Costo Certificado</label><input type="number" id="costoCert" placeholder="0"></div>
                    <div><label>Costo Evaluación</label><input type="number" id="evalCert" placeholder="0"></div>
                </div>
                <div><label>Link Drive</label><input type="url" id="linkCert" placeholder="https://..."></div>
                <button type="submit" class="w-full blue-gradient text-white py-4 rounded-2xl font-bold shadow-lg">Guardar Certificación</button>
            </form>
        </div>
    </div>

    <!-- MODAL TALLER -->
    <div id="modal-taller" class="fixed inset-0 bg-black/60 backdrop-blur-sm hidden items-end sm:items-center justify-center z-[1000] p-0 sm:p-4 overflow-y-auto">
        <div class="bg-white rounded-t-[32px] sm:rounded-[32px] w-full max-w-lg shadow-2xl">
            <div class="p-6 border-b border-purple-50 flex justify-between items-center">
                <h3 id="talModalTitle" class="text-lg font-bold text-purple-600">Configurar Taller</h3>
                <button onclick="cerrarModal('taller')" class="w-10 h-10 bg-gray-100 rounded-full flex items-center justify-center text-gray-400 font-bold">&times;</button>
            </div>
            <form id="tallerForm" class="p-6 space-y-5">
                <input type="hidden" id="editIdTal">
                <div><label>Nombre del Taller</label><input type="text" id="nombreTal" placeholder="Ej. Automaquillaje" required></div>
                <div class="bg-purple-50/50 p-4 rounded-2xl border border-purple-100">
                    <label class="text-purple-600">Seleccionar Días</label>
                    <div id="calMonthName" class="text-center font-bold text-xs mb-2 text-gray-500 uppercase">Mes Actual</div>
                    <div class="calendar-grid mb-2" id="calendarGrid"></div>
                </div>
                <div class="grid grid-cols-2 gap-4">
                    <div><label>Costo por Día ($)</label><input type="number" id="costoPorDiaTal" placeholder="0" oninput="recalcTaller()"></div>
                    <div><label>Horas por Día</label><input type="text" id="horasTal" placeholder="Ej. 3h"></div>
                </div>
                <!-- CAMPO HORARIO TALLER -->
                <div><label>Horario</label><input type="text" id="horarioTal" placeholder="Ej. 4pm a 7pm"></div>

                <div class="bg-purple-600 p-4 rounded-2xl flex justify-between items-center shadow-lg">
                    <div>
                        <div class="text-[10px] text-purple-200 font-bold uppercase">Inversión Final</div>
                        <div class="text-xs text-white opacity-80" id="talSummary">0 días seleccionados</div>
                    </div>
                    <div class="text-2xl font-black text-white" id="totalTallerDisplay">$0</div>
                    <input type="hidden" id="costoTal">
                </div>
                <div><label>Link Drive</label><input type="url" id="linkTal" placeholder="https://..."></div>
                <button type="submit" class="w-full purple-gradient text-white py-4 rounded-2xl font-bold shadow-lg">Guardar Taller</button>
            </form>
        </div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-app.js";
        import { getFirestore, collection, addDoc, onSnapshot, serverTimestamp, doc, updateDoc, deleteDoc } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-firestore.js";
        import { getAuth, signInAnonymously } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-auth.js";

        const firebaseConfig = JSON.parse('{"apiKey": "AIzaSyBv4oDOH5mPBN79m_Y47UYa9H1SJ1S7BL8","authDomain": "gestor-de-diplomados.firebaseapp.com","projectId": "gestor-de-diplomados","storageBucket": "gestor-de-diplomados.firebasestorage.app","messagingSenderId": "25065074693","appId": "1:25065074693:web:6541747c26543c709f2c6c"}');
        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);
        const auth = getAuth(app);
        const APP_ID = 'sullybec-admin';

        const colDip = collection(db, 'artifacts', APP_ID, 'public', 'data', 'diplomados');
        const colCert = collection(db, 'artifacts', APP_ID, 'public', 'data', 'certificaciones');
        const colTal = collection(db, 'artifacts', APP_ID, 'public', 'data', 'talleres');

        let dataDip = [], dataCert = [], dataTal = [];
        let selectedDates = [];

        const init = async () => {
            await signInAnonymously(auth);
            listenAll();
            buildCalendar();
        };

        const listenAll = () => {
            onSnapshot(colDip, snap => { dataDip = snap.docs.map(d => ({id: d.id, ...d.data()})); renderDip(); });
            onSnapshot(colCert, snap => { dataCert = snap.docs.map(d => ({id: d.id, ...d.data()})); renderCert(); });
            onSnapshot(colTal, snap => { dataTal = snap.docs.map(d => ({id: d.id, ...d.data()})); renderTal(); });
        };

        window.switchTab = (tab) => {
            ['diplomados', 'certificaciones', 'talleres'].forEach(k => {
                const el = document.getElementById(`sec-${k}`);
                if (el) el.classList.toggle('hidden', k !== tab);
            });
            document.getElementById('tabDip').classList.toggle('active', tab === 'diplomados');
            document.getElementById('tabCert').classList.toggle('active', tab === 'certificaciones');
            document.getElementById('tabTal').classList.toggle('active', tab === 'talleres');
        };

        window.abrirModal = (tipo, id = null) => {
            const modal = document.getElementById(`modal-${tipo}`);
            const form = document.getElementById(`${tipo}Form`);
            if (!modal || !form) return;

            modal.style.display = 'flex';
            form.reset();
            
            const editIdInput = document.getElementById(`editId${tipo.charAt(0).toUpperCase() + tipo.slice(1,3)}`);
            if (editIdInput) editIdInput.value = id || '';

            if(tipo === 'diplomado') {
                if(id) {
                    const d = dataDip.find(x => x.id === id);
                    if (d) {
                        document.getElementById('nombreDip').value = d.nombre || '';
                        document.getElementById('duracionDip').value = d.duracion || '';
                        document.getElementById('fechaInicioDip').value = d.fechaInicio || '';
                        document.getElementById('horarioDip').value = d.horario || ''; // Recuperar horario
                        document.getElementById('inscripcionDip').value = d.inscripcion || 0;
                        document.getElementById('descuentoDip').value = d.descuento || 0;
                        document.getElementById('claseDip').value = d.costoClase || 0;
                        document.getElementById('mesDip').value = d.costoMes || 0;
                        document.getElementById('totalDip').value = d.costoTotal || 0;
                        document.getElementById('linkDip').value = d.temarioLink || '';
                    }
                }
                recalcDiplomado();
            } else if(tipo === 'certificacion' && id) {
                const c = dataCert.find(x => x.id === id);
                if (c) {
                    document.getElementById('nombreCert').value = c.nombre || '';
                    document.getElementById('costoCert').value = c.costoCert || 0;
                    document.getElementById('evalCert').value = c.costoEval || 0;
                    document.getElementById('linkCert').value = c.linkDrive || '';
                }
            } else if(tipo === 'taller') {
                selectedDates = [];
                if(id) {
                    const t = dataTal.find(x => x.id === id);
                    if (t) {
                        document.getElementById('nombreTal').value = t.nombre || '';
                        document.getElementById('costoPorDiaTal').value = t.costoPorDia || 0;
                        document.getElementById('horasTal').value = t.horasPorDia || '';
                        document.getElementById('horarioTal').value = t.horario || ''; // Recuperar horario
                        document.getElementById('linkTal').value = t.linkDrive || '';
                        selectedDates = t.fechasArray || [];
                    }
                }
                updateCalendarUI();
                recalcTaller();
            }
        };

        window.cerrarModal = (tipo) => {
            const modal = document.getElementById(`modal-${tipo}`);
            if (modal) modal.style.display = 'none';
        };

        window.recalcDiplomado = () => {
            const total = Number(document.getElementById('totalDip').value) || 0;
            const desc = Number(document.getElementById('descuentoDip').value) || 0;
            const final = total - (total * (desc / 100));
            const savings = total - final;
            
            document.getElementById('finalPriceDip').innerText = `$${final.toLocaleString()}`;
            document.getElementById('savingsDip').innerText = `-$${savings.toLocaleString()}`;
        };

        function buildCalendar() {
            const grid = document.getElementById('calendarGrid');
            if (!grid) return;
            const now = new Date();
            const year = now.getFullYear();
            const month = now.getMonth();
            const monthNames = ["Enero", "Febrero", "Marzo", "Abril", "Mayo", "Junio", "Julio", "Agosto", "Septiembre", "Octubre", "Noviembre", "Diciembre"];
            document.getElementById('calMonthName').innerText = `${monthNames[month]} ${year}`;
            const firstDay = new Date(year, month, 1).getDay();
            const daysInMonth = new Date(year, month + 1, 0).getDate();
            grid.innerHTML = '';
            ['D','L','M','M','J','V','S'].forEach(d => grid.innerHTML += `<div class="text-center font-bold text-[9px] text-gray-300 pb-1">${d}</div>`);
            for(let i=0; i<firstDay; i++) grid.innerHTML += '<div></div>';
            for(let d=1; d<=daysInMonth; d++) {
                const dateStr = `${year}-${String(month+1).padStart(2,'0')}-${String(d).padStart(2,'0')}`;
                grid.innerHTML += `<div class="calendar-day" data-date="${dateStr}" onclick="toggleDate('${dateStr}')">${d}</div>`;
            }
        }

        window.toggleDate = (date) => {
            const idx = selectedDates.indexOf(date);
            if(idx > -1) selectedDates.splice(idx, 1);
            else selectedDates.push(date);
            updateCalendarUI();
            recalcTaller();
        };

        function updateCalendarUI() {
            document.querySelectorAll('.calendar-day').forEach(el => el.classList.toggle('selected', selectedDates.includes(el.dataset.date)));
        }

        window.recalcTaller = () => {
            const costoDia = Number(document.getElementById('costoPorDiaTal').value) || 0;
            const total = costoDia * selectedDates.length;
            const summary = document.getElementById('talSummary');
            if(summary) summary.innerText = `${selectedDates.length} día(s) seleccionados`;
            const display = document.getElementById('totalTallerDisplay');
            if(display) display.innerText = `$${total.toLocaleString()}`;
            const input = document.getElementById('costoTal');
            if(input) input.value = total;
        };

        function renderDip() {
            const grid = document.getElementById('diplomasGrid');
            grid.innerHTML = dataDip.map(d => {
                const final = d.costoTotal - (d.costoTotal * ((d.descuento || 0) / 100));
                return `
                <div class="bg-white p-5 rounded-3xl border border-pink-50 shadow-sm relative overflow-hidden">
                    <div class="flex justify-between items-start mb-2">
                        <h4 class="font-bold text-gray-800 leading-tight">${d.nombre}</h4>
                        <div class="flex gap-2">
                            <button onclick="abrirModal('diplomado', '${d.id}')" class="text-sm p-1">✏️</button>
                            <button onclick="borrar('diplomados', '${d.id}')" class="text-sm p-1 opacity-30">🗑️</button>
                        </div>
                    </div>
                    <div class="flex flex-wrap gap-x-3 gap-y-1 mb-4">
                        <p class="text-[10px] font-bold text-pink-400 uppercase">${d.duracion || '6 meses'}</p>
                        <p class="text-[10px] font-bold text-gray-400 uppercase">🕒 ${d.horario || 'Sin horario'}</p>
                    </div>
                    <div class="space-y-1">
                        <div class="flex justify-between text-[11px]"><span class="text-gray-400">Inversión Base:</span><span class="line-through text-gray-300">$${Number(d.costoTotal || 0).toLocaleString()}</span></div>
                        <div class="flex justify-between text-[11px]"><span class="text-gray-400">Descuento:</span><span class="text-green-500 font-bold">-${d.descuento || 0}%</span></div>
                        <div class="mt-3 pt-3 border-t border-pink-50 flex justify-between items-center">
                            <span class="text-xs font-bold text-gray-400 uppercase">Ahorras: $${(d.costoTotal - final).toLocaleString()}</span>
                            <span class="text-lg font-black text-pink-600">$${final.toLocaleString()}</span>
                        </div>
                    </div>
                </div>`;
            }).join('');
        }

        function renderCert() {
            const grid = document.getElementById('certGrid');
            grid.innerHTML = dataCert.map(c => `
                <div class="bg-white p-5 rounded-3xl border border-blue-50 shadow-sm">
                    <div class="flex justify-between items-start mb-3">
                        <h4 class="font-bold text-gray-800 leading-tight">${c.nombre}</h4>
                        <div class="flex gap-2">
                            <button onclick="abrirModal('certificacion', '${c.id}')" class="text-sm p-1">✏️</button>
                            <button onclick="borrar('certificaciones', '${c.id}')" class="text-sm p-1 opacity-30">🗑️</button>
                        </div>
                    </div>
                    <div class="bg-blue-50 p-3 rounded-2xl flex justify-between items-center">
                        <span class="text-xs font-bold text-blue-500 uppercase">Inversión:</span>
                        <span class="text-xl font-black text-blue-700">$${(Number(c.costoCert || 0) + Number(c.costoEval || 0)).toLocaleString()}</span>
                    </div>
                </div>`).join('');
        }

        function renderTal() {
            const grid = document.getElementById('talleresGrid');
            grid.innerHTML = dataTal.map(t => `
                <div class="bg-white p-5 rounded-3xl border border-purple-50 shadow-sm">
                    <div class="flex justify-between items-start mb-1">
                        <h4 class="font-bold text-gray-800 leading-tight">${t.nombre}</h4>
                        <div class="flex gap-2">
                            <button onclick="abrirModal('taller', '${t.id}')" class="text-sm p-1">✏️</button>
                            <button onclick="borrar('talleres', '${t.id}')" class="text-sm p-1 opacity-30">🗑️</button>
                        </div>
                    </div>
                    <div class="flex flex-wrap gap-x-3 gap-y-1 mb-3">
                        <div class="text-[10px] font-bold text-purple-400 uppercase">${t.fechasArray?.length || 0} DÍAS</div>
                        <div class="text-[10px] font-bold text-gray-400 uppercase">🕒 ${t.horario || 'Sin horario'}</div>
                    </div>
                    <div class="bg-purple-50 p-3 rounded-2xl flex justify-between items-center">
                        <span class="text-xs font-bold text-purple-600 uppercase">Total:</span>
                        <span class="text-xl font-black text-purple-700">$${Number(t.costo || 0).toLocaleString()}</span>
                    </div>
                </div>`).join('');
        }

        window.borrar = async (col, id) => { if(confirm('¿Eliminar definitivamente?')) await deleteDoc(doc(db, 'artifacts', APP_ID, 'public', 'data', col, id)); };

        document.getElementById('diplomadoForm').onsubmit = async (e) => {
            e.preventDefault();
            const id = document.getElementById('editIdDip').value;
            const data = {
                nombre: document.getElementById('nombreDip').value,
                duracion: document.getElementById('duracionDip').value,
                fechaInicio: document.getElementById('fechaInicioDip').value,
                horario: document.getElementById('horarioDip').value, // Guardar horario
                inscripcion: Number(document.getElementById('inscripcionDip').value),
                descuento: Number(document.getElementById('descuentoDip').value),
                costoClase: Number(document.getElementById('claseDip').value),
                costoMes: Number(document.getElementById('mesDip').value),
                costoTotal: Number(document.getElementById('totalDip').value),
                temarioLink: document.getElementById('linkDip').value,
                updated: serverTimestamp()
            };
            if(id) await updateDoc(doc(db, 'artifacts', APP_ID, 'public', 'data', 'diplomados', id), data);
            else await addDoc(colDip, {...data, created: serverTimestamp()});
            cerrarModal('diplomado');
        };

        document.getElementById('certificacionForm').onsubmit = async (e) => {
            e.preventDefault();
            const id = document.getElementById('editIdCert').value;
            const data = {
                nombre: document.getElementById('nombreCert').value,
                costoCert: Number(document.getElementById('costoCert').value),
                costoEval: Number(document.getElementById('evalCert').value),
                linkDrive: document.getElementById('linkCert').value,
                updated: serverTimestamp()
            };
            if(id) await updateDoc(doc(db, 'artifacts', APP_ID, 'public', 'data', 'certificaciones', id), data);
            else await addDoc(colCert, {...data, created: serverTimestamp()});
            cerrarModal('certificacion');
        };

        document.getElementById('tallerForm').onsubmit = async (e) => {
            e.preventDefault();
            const id = document.getElementById('editIdTal').value;
            const data = {
                nombre: document.getElementById('nombreTal').value,
                costoPorDia: Number(document.getElementById('costoPorDiaTal').value),
                horasPorDia: document.getElementById('horasTal').value,
                horario: document.getElementById('horarioTal').value, // Guardar horario
                fechasArray: selectedDates,
                costo: Number(document.getElementById('costoTal').value),
                linkDrive: document.getElementById('linkTal').value,
                updated: serverTimestamp()
            };
            if(id) await updateDoc(doc(db, 'artifacts', APP_ID, 'public', 'data', 'talleres', id), data);
            else await addDoc(colTal, {...data, created: serverTimestamp()});
            cerrarModal('taller');
        };

        init();
    </script>
</body>
