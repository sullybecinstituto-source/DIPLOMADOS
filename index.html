<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Admin | SullyBec Instituto</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Plus Jakarta Sans', sans-serif; background-color: #fff5f7; -webkit-tap-highlight-color: transparent; }
        .pink-gradient { background: linear-gradient(135deg, #ff85a2 0%, #ff4d6d 100%); }
        .card-shadow { box-shadow: 0 10px 25px -5px rgba(255, 133, 162, 0.1); }
        input, select { border: 1px solid #ffe4e9; border-radius: 12px; padding: 10px; width: 100%; outline: none; transition: all 0.3s; font-size: 15px; background: white; }
        input:focus { border-color: #ff85a2; box-shadow: 0 0 0 3px rgba(255, 133, 162, 0.1); }
        label { display: block; font-size: 0.75rem; font-weight: 700; color: #64748b; margin-bottom: 4px; text-transform: uppercase; letter-spacing: 0.025em; }
        
        @media (max-width: 640px) {
            .mobile-fab { position: fixed; bottom: 30px; right: 20px; width: 60px; height: 60px; border-radius: 50%; z-index: 999; display: flex; align-items: center; justify-content: center; box-shadow: 0 8px 20px rgba(255, 77, 109, 0.4); }
            .mobile-fab span:last-child { display: none; }
        }

        #errorLog { display: none; background: #fee2e2; border: 1px solid #ef4444; color: #b91c1c; padding: 10px; border-radius: 12px; margin-bottom: 20px; font-size: 13px; }
    </style>
</head>
<body>
    <nav class="bg-white border-b border-pink-100 px-4 md:px-8 py-4 sticky top-0 z-50 flex justify-between items-center">
        <div class="flex items-center gap-2">
            <div class="w-8 h-8 pink-gradient rounded-full flex items-center justify-center text-white font-bold shadow-lg">S</div>
            <h1 class="text-lg font-bold italic text-pink-500">SullyBec.Instituto</h1>
        </div>
    </nav>

    <main class="max-w-6xl mx-auto p-4 md:p-8">
        <div id="errorLog"></div>

        <div class="flex justify-between items-end mb-8">
            <div>
                <h2 class="text-2xl md:text-3xl font-bold text-gray-800">Gestión de Diplomados</h2>
                <p class="text-gray-500 text-sm">Configura costos, fechas y enlaces de Drive</p>
            </div>
            <button onclick="window.abrirModal()" class="mobile-fab pink-gradient text-white px-6 py-3 rounded-2xl font-bold transition-all hover:scale-105 active:scale-95 flex items-center gap-2">
                <span class="text-xl">+</span><span>Nuevo</span>
            </button>
        </div>

        <div id="statusMsg" class="mb-4 text-center hidden">
            <span class="px-4 py-2 rounded-full text-xs font-bold bg-pink-100 text-pink-600"></span>
        </div>

        <div id="diplomasGrid" class="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-3 gap-6">
            <div id="loadingState" class="col-span-full text-center py-20 text-gray-400 italic">
                Estableciendo conexión segura...
            </div>
        </div>
    </main>

    <!-- Modal Formulario -->
    <div id="modal" class="fixed inset-0 bg-black/60 backdrop-blur-sm hidden items-center justify-center z-[1000] p-4 overflow-y-auto" style="display: none;">
        <div class="bg-white rounded-3xl w-full max-w-2xl shadow-2xl my-auto animate-in zoom-in duration-200">
            <div class="p-6 border-b border-pink-50 flex justify-between items-center">
                <h3 id="modalTitle" class="text-xl font-bold text-pink-600">Alta de Diplomado</h3>
                <button onclick="window.cerrarModal()" class="text-gray-400 text-3xl hover:text-pink-500 transition-colors">&times;</button>
            </div>
            
            <form id="diplomaForm" class="p-6 md:p-8 space-y-6">
                <input type="hidden" id="editId">
                
                <div class="grid grid-cols-1 md:grid-cols-2 gap-4">
                    <div class="md:col-span-2">
                        <label>Nombre del Diplomado</label>
                        <input type="text" id="nombre" required placeholder="Ej. Masaje Champi e Indian Head">
                    </div>
                    <div>
                        <label>Duración</label>
                        <input type="text" id="duracion" required placeholder="Ej. 6 meses / 24 clases">
                    </div>
                    <div>
                        <label>Próxima Fecha de Inicio</label>
                        <input type="date" id="fechaInicio" required>
                    </div>
                </div>

                <div class="grid grid-cols-2 md:grid-cols-4 gap-4 bg-pink-50/30 p-4 rounded-2xl">
                    <div class="col-span-2 md:col-span-4"><label class="text-pink-600">Estructura de Costos ($)</label></div>
                    <div>
                        <label>Por Clase</label>
                        <input type="number" id="costoClase" required placeholder="0" min="0" step="any">
                    </div>
                    <div>
                        <label>Por Mes</label>
                        <input type="number" id="costoMes" required placeholder="0" min="0" step="any">
                    </div>
                    <div>
                        <label>Total Completo</label>
                        <input type="number" id="costoTotal" required placeholder="0" min="0" step="any">
                    </div>
                    <div>
                        <label>Extras (Trámites)</label>
                        <input type="number" id="costoExtra" required placeholder="0" min="0" step="any">
                    </div>
                </div>

                <div>
                    <label>Enlace de Google Drive (Temario PDF)</label>
                    <input type="url" id="temarioLink" placeholder="https://drive.google.com/file/d/...">
                    <p class="text-[10px] text-gray-400 mt-1 italic">Asegúrate de que el enlace sea público en Drive.</p>
                </div>

                <div class="flex gap-3 pt-4">
                    <button type="button" onclick="window.cerrarModal()" class="flex-1 bg-gray-100 text-gray-600 py-4 rounded-2xl font-bold hover:bg-gray-200 transition-colors">Cancelar</button>
                    <button type="submit" id="btnSubmit" class="flex-1 pink-gradient text-white py-4 rounded-2xl font-bold shadow-lg hover:opacity-90 transition-opacity">Guardar Diplomado</button>
                </div>
            </form>
        </div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-app.js";
        import { getFirestore, collection, addDoc, onSnapshot, query, serverTimestamp, doc, updateDoc } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-firestore.js";
        import { getAuth, signInAnonymously } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-auth.js";

        // CONFIGURACIÓN INTEGRADA CON TUS DATOS
        const firebaseConfig = {
            apiKey: "AIzaSyBv4oDOH5mPBN79m_Y47UYa9H1SJ1S7BL8",
            authDomain: "gestor-de-diplomados.firebaseapp.com",
            projectId: "gestor-de-diplomados",
            storageBucket: "gestor-de-diplomados.firebasestorage.app",
            messagingSenderId: "25065074693",
            appId: "1:25065074693:web:6541747c26543c709f2c6c"
        };

        let db, auth, collectionRef;
        const APP_ID_PATH = 'sullybec-admin';

        function showError(msg) {
            const log = document.getElementById('errorLog');
            log.innerText = "⚠️ " + msg;
            log.style.display = 'block';
        }

        const initialize = async () => {
            try {
                const app = initializeApp(firebaseConfig);
                db = getFirestore(app);
                auth = getAuth(app);
                collectionRef = collection(db, 'artifacts', APP_ID_PATH, 'public', 'data', 'diplomados');

                // Autenticación anónima para permitir guardar
                await signInAnonymously(auth);

                startListening();
            } catch (e) { 
                showError("Error de conexión: " + e.message);
                console.error(e); 
            }
        };

        let diplomadosData = [];
        let isSaving = false;

        window.abrirModal = (id = null) => {
            const modal = document.getElementById('modal');
            const form = document.getElementById('diplomaForm');
            modal.style.display = 'flex';
            modal.classList.remove('hidden');
            
            if(id) {
                const d = diplomadosData.find(item => item.id === id);
                document.getElementById('modalTitle').innerText = "Editar Diplomado";
                document.getElementById('editId').value = id;
                document.getElementById('nombre').value = d.nombre || '';
                document.getElementById('duracion').value = d.duracion || '';
                document.getElementById('fechaInicio').value = d.fechaInicio || '';
                document.getElementById('costoClase').value = d.costoClase || '';
                document.getElementById('costoMes').value = d.costoMes || '';
                document.getElementById('costoTotal').value = d.costoTotal || '';
                document.getElementById('costoExtra').value = d.costoExtra || '';
                document.getElementById('temarioLink').value = d.temarioLink || '';
            } else {
                document.getElementById('modalTitle').innerText = "Alta de Diplomado";
                form.reset();
                document.getElementById('editId').value = '';
            }
        };

        window.cerrarModal = () => {
            if (isSaving) return;
            document.getElementById('modal').style.display = 'none';
        };

        function startListening() {
            onSnapshot(query(collectionRef), (snapshot) => {
                const grid = document.getElementById('diplomasGrid');
                grid.innerHTML = '';
                diplomadosData = [];
                
                snapshot.forEach(doc => diplomadosData.push({ id: doc.id, ...doc.data() }));
                diplomadosData.sort((a, b) => (b.fechaCreacion?.seconds || 0) - (a.fechaCreacion?.seconds || 0));

                if (diplomadosData.length === 0) {
                    grid.innerHTML = '<div class="col-span-full text-center py-20 text-gray-400 italic">No hay diplomados registrados. Haz clic en "+ Nuevo".</div>';
                    return;
                }

                diplomadosData.forEach(d => {
                    grid.innerHTML += `
                        <div class="bg-white rounded-3xl p-6 card-shadow border border-pink-50 relative overflow-hidden">
                            <div class="absolute top-0 right-0 p-4">
                                <button onclick="window.abrirModal('${d.id}')" class="bg-pink-50 text-pink-500 p-2 rounded-xl hover:bg-pink-500 hover:text-white transition-colors">
                                    <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15.232 5.232l3.536 3.536m-2.036-5.036a2.5 2.5 0 113.536 3.536L6.5 21.036H3v-3.572L16.732 3.732z"></path></svg>
                                </button>
                            </div>
                            <h4 class="font-bold text-gray-800 text-xl pr-10 mb-2">${d.nombre}</h4>
                            <p class="text-pink-400 text-sm font-bold mb-4">Inicio: ${d.fechaInicio}</p>
                            
                            <div class="grid grid-cols-2 gap-3 text-xs mb-4">
                                <div class="bg-gray-50 p-2 rounded-lg"><b>Mes:</b> $${d.costoMes}</div>
                                <div class="bg-gray-50 p-2 rounded-lg"><b>Clase:</b> $${d.costoClase}</div>
                                <div class="bg-pink-50 text-pink-600 p-2 rounded-lg font-bold"><b>Total:</b> $${d.costoTotal}</div>
                                <div class="bg-orange-50 text-orange-600 p-2 rounded-lg"><b>Extras:</b> $${d.costoExtra}</div>
                            </div>
                            
                            <div class="flex items-center justify-between text-xs text-gray-400 border-t pt-4">
                                <span>Duración: ${d.duracion}</span>
                                ${d.temarioLink ? `
                                    <a href="${d.temarioLink}" target="_blank" class="text-pink-500 underline font-bold">Ver Temario</a>
                                ` : ''}
                            </div>
                        </div>
                    `;
                });
            }, (err) => {
                showError("Error de permisos: Asegúrate de configurar las Reglas en Firestore (Rules). " + err.message);
            });
        }

        const form = document.getElementById('diplomaForm');
        form.onsubmit = async (e) => {
            e.preventDefault();
            if (isSaving) return;

            const btn = document.getElementById('btnSubmit');
            const editId = document.getElementById('editId').value;
            
            isSaving = true;
            btn.disabled = true;
            btn.innerText = "Guardando...";

            try {
                const data = {
                    nombre: document.getElementById('nombre').value.trim(),
                    duracion: document.getElementById('duracion').value.trim(),
                    fechaInicio: document.getElementById('fechaInicio').value,
                    costoClase: Number(document.getElementById('costoClase').value) || 0,
                    costoMes: Number(document.getElementById('costoMes').value) || 0,
                    costoTotal: Number(document.getElementById('costoTotal').value) || 0,
                    costoExtra: Number(document.getElementById('costoExtra').value) || 0,
                    temarioLink: document.getElementById('temarioLink').value.trim(),
                    ultimaModificacion: serverTimestamp()
                };

                if(editId) {
                    const docRef = doc(db, 'artifacts', APP_ID_PATH, 'public', 'data', 'diplomados', editId);
                    await updateDoc(docRef, data);
                } else {
                    await addDoc(collectionRef, { 
                        ...data, 
                        fechaCreacion: serverTimestamp()
                    });
                }
                
                window.cerrarModal();
                showStatus("¡Guardado correctamente!");
            } catch (error) {
                console.error(error);
                showError("No se pudo guardar: " + error.message);
            } finally {
                isSaving = false;
                btn.disabled = false;
                btn.innerText = "Guardar Diplomado";
            }
        };

        function showStatus(msg) {
            const el = document.getElementById('statusMsg');
            el.querySelector('span').innerText = msg;
            el.classList.remove('hidden');
            setTimeout(() => el.classList.add('hidden'), 3000);
        }

        initialize();
    </script>
</body>
</html>
