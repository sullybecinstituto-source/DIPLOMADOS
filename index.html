<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Panel | Sullybec Instituto</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600&family=Playfair+Display:wght@700&display=swap" rel="stylesheet">
    <!-- Firebase SDKs -->
    <script src="https://www.gstatic.com/firebasejs/11.6.1/firebase-app.js" type="module"></script>
    <script src="https://www.gstatic.com/firebasejs/11.6.1/firebase-auth.js" type="module"></script>
    <script src="https://www.gstatic.com/firebasejs/11.6.1/firebase-firestore.js" type="module"></script>
    <style>
        body { font-family: 'Poppins', sans-serif; background-color: #fffafb; }
        .font-serif { font-family: 'Playfair Display', serif; }
        .pink-border { border-color: #fce4ec; }
        .pink-accent { color: #f06292; }
        .bg-pink-soft { background-color: #fce4ec; }
        .btn-pink { background-color: #f06292; color: white; transition: all 0.3s; }
        .btn-pink:hover { background-color: #e91e63; transform: translateY(-1px); }
        .card { background: white; border-radius: 15px; border: 1px solid #fce4ec; box-shadow: 0 4px 15px rgba(240, 98, 146, 0.05); }
        input, textarea, select { 
            border: 1px solid #fce4ec; 
            border-radius: 8px; 
            padding: 10px; 
            outline: none;
            transition: border 0.3s;
        }
        input:focus { border-color: #f06292; }
        .loader { border: 3px solid #f3f3f3; border-top: 3px solid #f06292; border-radius: 50%; width: 20px; height: 20px; animation: spin 1s linear infinite; }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
    </style>
</head>
<body>

    <!-- Sidebar / Nav -->
    <nav class="bg-white border-b pink-border px-6 py-4 flex justify-between items-center sticky top-0 z-50">
        <div class="flex items-center gap-3">
            <div class="w-10 h-10 bg-pink-soft rounded-full flex items-center justify-center">
                <span class="pink-accent font-bold">S</span>
            </div>
            <h1 class="font-serif text-2xl pink-accent italic">Sullybec.Instituto</h1>
        </div>
        <div class="flex gap-4 text-sm font-medium">
            <button onclick="switchTab('diplomados')" class="hover:pink-accent">Diplomados</button>
            <button onclick="switchTab('info')" class="hover:pink-accent">Información General</button>
        </div>
    </nav>

    <main class="max-w-6xl mx-auto p-6">
        
        <!-- Tab: Diplomados -->
        <div id="tab-diplomados">
            <div class="flex justify-between items-center mb-8">
                <h2 class="text-2xl font-serif text-gray-800">Gestión de Oferta Académica</h2>
                <button onclick="openModal()" class="btn-pink px-6 py-2 rounded-full font-semibold shadow-md">+ Nuevo Diplomado</button>
            </div>

            <div id="diplomados-grid" class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-6">
                <div class="col-span-full py-20 text-center text-gray-400">Cargando diplomados...</div>
            </div>
        </div>

        <!-- Tab: Info General -->
        <div id="tab-info" class="hidden">
            <h2 class="text-2xl font-serif text-gray-800 mb-8">Datos del Instituto</h2>
            <div class="card p-8 max-w-2xl">
                <form id="form-settings" class="space-y-4">
                    <div>
                        <label class="block text-sm text-gray-500 mb-1">Nombre Comercial</label>
                        <input type="text" id="set-name" class="w-full" value="Sullybec.Instituto">
                    </div>
                    <div>
                        <label class="block text-sm text-gray-500 mb-1">Enlace de Ubicación (Google Maps)</label>
                        <input type="text" id="set-location" class="w-full" value="https://maps.app.goo.gl/8CteShWLiUzX8xxTA">
                    </div>
                    <div>
                        <label class="block text-sm text-gray-500 mb-1">WhatsApp de Contacto (para automatización)</label>
                        <input type="text" id="set-phone" class="w-full" placeholder="Ej: 521234567890">
                    </div>
                    <button type="submit" class="btn-pink w-full py-3 rounded-lg font-semibold mt-4">Guardar Cambios</button>
                </form>
            </div>
        </div>
    </main>

    <!-- Modal Formulario -->
    <div id="modal" class="fixed inset-0 bg-black bg-opacity-30 backdrop-blur-sm hidden flex items-center justify-center p-4 z-[100]">
        <div class="card w-full max-w-3xl max-h-[90vh] overflow-y-auto p-8 relative">
            <button onclick="closeModal()" class="absolute top-4 right-4 text-gray-400 hover:text-gray-600 text-2xl">&times;</button>
            <h3 id="modal-title" class="text-2xl font-serif pink-accent mb-6">Nuevo Diplomado</h3>
            
            <form id="form-diplomado" class="space-y-6">
                <input type="hidden" id="diplomado-id">
                
                <div class="grid grid-cols-1 md:grid-cols-2 gap-4">
                    <div class="md:col-span-2">
                        <label class="block text-sm font-medium text-gray-700">Nombre del Diplomado</label>
                        <input type="text" id="nombre" class="w-full" required>
                    </div>
                    <div>
                        <label class="block text-sm font-medium text-gray-700">Duración (ej. 6 meses)</label>
                        <input type="text" id="duracion" class="w-full" required>
                    </div>
                    <div>
                        <label class="block text-sm font-medium text-gray-700">Fecha de Inicio</label>
                        <input type="date" id="fechaInicio" class="w-full" required>
                    </div>
                </div>

                <div class="bg-pink-soft p-4 rounded-xl space-y-4">
                    <h4 class="font-semibold text-pink-700 border-b border-pink-200 pb-2">Estructura de Costos</h4>
                    <div class="grid grid-cols-1 md:grid-cols-2 gap-4">
                        <div>
                            <label class="block text-xs font-bold uppercase text-pink-600">Costo Real Mensual ($)</label>
                            <input type="number" id="costoReal" class="w-full" oninput="calculateBeca()" required>
                        </div>
                        <div>
                            <label class="block text-xs font-bold uppercase text-pink-600">Costo a Cobrar Mensual ($)</label>
                            <input type="number" id="costoCobrar" class="w-full" oninput="calculateBeca()" required>
                        </div>
                    </div>
                    <div class="flex gap-4 items-center">
                        <div class="flex-1 bg-white p-3 rounded-lg border pink-border text-center">
                            <span class="block text-[10px] text-gray-400">BECA REAL</span>
                            <span id="label-beca" class="text-xl font-bold pink-accent">0%</span>
                        </div>
                        <div class="flex-1 bg-white p-3 rounded-lg border pink-border text-center">
                            <span class="block text-[10px] text-gray-400">TOTAL DIPLOMADO (REAL)</span>
                            <span id="label-total-real" class="text-xl font-bold text-gray-400">$0</span>
                        </div>
                        <div class="flex-1 bg-white p-3 rounded-lg border pink-border text-center">
                            <span class="block text-[10px] text-gray-400">TOTAL CON DESCUENTO</span>
                            <span id="label-total-desc" class="text-xl font-bold text-green-600">$0</span>
                        </div>
                    </div>
                </div>

                <div>
                    <label class="block text-sm font-medium text-gray-700">Enlace PDF Temario (Drive/Dropbox/Cloud)</label>
                    <input type="url" id="pdfUrl" class="w-full" placeholder="https://...">
                </div>

                <div>
                    <label class="block text-sm font-medium text-gray-700">Información de Promociones</label>
                    <textarea id="promociones" class="w-full h-24" placeholder="Ej: Pago total del diplomado tiene un 10% adicional..."></textarea>
                </div>

                <button type="submit" id="btn-save" class="btn-pink w-full py-4 rounded-xl font-bold shadow-lg text-lg">Guardar en la Nube</button>
            </form>
        </div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-app.js";
        import { getAuth, signInAnonymously, signInWithCustomToken, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-auth.js";
        import { getFirestore, doc, setDoc, getDoc, collection, onSnapshot, addDoc, deleteDoc, query } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-firestore.js";

        // Firebase Config
        const firebaseConfig = JSON.parse(__firebase_config);
        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);
        const db = getFirestore(app);
        const appId = typeof __app_id !== 'undefined' ? __app_id : 'sullybec-admin';

        let user = null;

        // AUTHENTICATION FIRST
        const initAuth = async () => {
            try {
                if (typeof __initial_auth_token !== 'undefined' && __initial_auth_token) {
                    await signInWithCustomToken(auth, __initial_auth_token);
                } else {
                    await signInAnonymously(auth);
                }
            } catch (error) {
                console.error("Auth initialization failed:", error);
            }
        };

        // UI Tabs
        window.switchTab = (tab) => {
            document.getElementById('tab-diplomados').classList.toggle('hidden', tab !== 'diplomados');
            document.getElementById('tab-info').classList.toggle('hidden', tab !== 'info');
        };

        // Calculations
        window.calculateBeca = () => {
            const real = parseFloat(document.getElementById('costoReal').value) || 0;
            const cobrar = parseFloat(document.getElementById('costoCobrar').value) || 0;
            const duracionStr = document.getElementById('duracion').value;
            const meses = parseInt(duracionStr) || 1;

            if (real > 0) {
                const beca = ((real - cobrar) / real) * 100;
                document.getElementById('label-beca').innerText = `${Math.round(beca)}%`;
                document.getElementById('label-total-real').innerText = `$${(real * meses).toLocaleString()}`;
                document.getElementById('label-total-desc').innerText = `$${(cobrar * meses).toLocaleString()}`;
            }
        };

        // Modal Controls
        window.openModal = (data = null) => {
            document.getElementById('modal').classList.remove('hidden');
            const form = document.getElementById('form-diplomado');
            form.reset();
            document.getElementById('diplomado-id').value = '';
            document.getElementById('modal-title').innerText = 'Nuevo Diplomado';
            
            if (data) {
                document.getElementById('modal-title').innerText = 'Editar Diplomado';
                document.getElementById('diplomado-id').value = data.id;
                document.getElementById('nombre').value = data.nombre;
                document.getElementById('duracion').value = data.duracion;
                document.getElementById('fechaInicio').value = data.fechaInicio;
                document.getElementById('costoReal').value = data.costoReal;
                document.getElementById('costoCobrar').value = data.costoCobrar;
                document.getElementById('pdfUrl').value = data.pdfUrl || '';
                document.getElementById('promociones').value = data.promociones || '';
                calculateBeca();
            }
        };

        window.closeModal = () => document.getElementById('modal').classList.add('hidden');

        // Delete Logic
        window.deleteDiplomado = async (id) => {
            if (!auth.currentUser) return;
            if (confirm('¿Seguro que deseas eliminar este diplomado?')) {
                try {
                    await deleteDoc(doc(db, 'artifacts', appId, 'public', 'data', 'diplomados', id));
                } catch (e) { console.error("Delete error:", e); }
            }
        };

        // WhatsApp Share
        window.shareWhatsApp = (nombre, costo, beca) => {
            const phone = document.getElementById('set-phone').value || '';
            const location = document.getElementById('set-location').value;
            const msg = encodeURIComponent(`¡Hola! Te comparto información del diplomado *${nombre}* de Sullybec Instituto.\n\nContamos con una *Beca Especial del ${beca}%*, quedando tu mensualidad en solo *$${costo}*.\n\n📍 Ubicación: ${location}\n\n¡Inscríbete ahora!`);
            window.open(`https://wa.me/${phone}?text=${msg}`, '_blank');
        };

        // FIRESTORE SYNCING
        onAuthStateChanged(auth, (u) => {
            user = u;
            if (user) {
                setupSync();
            }
        });

        function setupSync() {
            // Settings Sync
            const settingsRef = doc(db, 'artifacts', appId, 'public', 'data', 'settings', 'general');
            onSnapshot(settingsRef, (snap) => {
                if (snap.exists()) {
                    const data = snap.data();
                    document.getElementById('set-name').value = data.name || '';
                    document.getElementById('set-location').value = data.location || '';
                    document.getElementById('set-phone').value = data.phone || '';
                }
            }, (err) => console.error("Settings error:", err));

            // Diplomados Sync
            const colRef = collection(db, 'artifacts', appId, 'public', 'data', 'diplomados');
            onSnapshot(colRef, (snap) => {
                const grid = document.getElementById('diplomados-grid');
                grid.innerHTML = '';
                
                if (snap.empty) {
                    grid.innerHTML = '<div class="col-span-full py-20 text-center text-gray-400 italic">No hay diplomados registrados.</div>';
                    return;
                }

                snap.forEach(docSnap => {
                    const d = docSnap.data();
                    const id = docSnap.id;
                    const beca = Math.round(((d.costoReal - d.costoCobrar) / d.costoReal) * 100);
                    
                    const card = document.createElement('div');
                    card.className = 'card p-6 flex flex-col justify-between';
                    card.innerHTML = `
                        <div>
                            <div class="flex justify-between items-start mb-4">
                                <span class="bg-pink-soft pink-accent text-[10px] font-bold px-2 py-1 rounded uppercase tracking-wider">Becado al ${beca}%</span>
                                <div class="flex gap-2">
                                    <button class="edit-btn text-blue-400 hover:text-blue-600">
                                        <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path d="M11 5H6a2 2 0 00-2 2v11a2 2 0 002 2h11a2 2 0 002-2v-5m-1.414-9.414a2 2 0 112.828 2.828L11.828 15H9v-2.828l8.586-8.586z"/></svg>
                                    </button>
                                    <button onclick="deleteDiplomado('${id}')" class="text-red-300 hover:text-red-500">
                                        <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path d="M19 7l-.867 12.142A2 2 0 0116.138 21H7.862a2 2 0 01-1.995-1.858L5 7m5 4v6m4-6v6m1-10V4a1 1 0 00-1-1h-4a1 1 0 00-1 1v3M4 7h16"/></svg>
                                    </button>
                                </div>
                            </div>
                            <h3 class="text-xl font-semibold text-gray-800 mb-1">${d.nombre}</h3>
                            <p class="text-sm text-gray-500 mb-4">Inicio: <span class="font-bold text-gray-700">${d.fechaInicio}</span> | ${d.duracion}</p>
                            
                            <div class="border-t pink-border pt-4 mt-4">
                                <div class="flex justify-between text-sm mb-1">
                                    <span class="text-gray-400">Mensual Real:</span>
                                    <span class="text-gray-400 line-through">$${d.costoReal}</span>
                                </div>
                                <div class="flex justify-between items-baseline">
                                    <span class="text-gray-600 font-medium">Beca:</span>
                                    <span class="text-2xl font-bold pink-accent">$${d.costoCobrar}</span>
                                </div>
                            </div>
                        </div>
                        <div class="mt-6 space-y-2">
                            ${d.pdfUrl ? `<a href="${d.pdfUrl}" target="_blank" class="block text-center py-2 text-xs font-semibold border pink-border rounded-lg text-gray-500 hover:bg-gray-50">Temario PDF</a>` : ''}
                            <button onclick="shareWhatsApp('${d.nombre}', '${d.costoCobrar}', '${beca}')" class="w-full py-2 bg-green-500 text-white rounded-lg text-xs font-bold hover:bg-green-600 flex items-center justify-center gap-2">
                                Compartir WhatsApp
                            </button>
                        </div>
                    `;
                    card.querySelector('.edit-btn').onclick = () => window.editDiplomado({id, ...d});
                    grid.appendChild(card);
                });
            }, (err) => console.error("Grid sync error:", err));
        }

        // Form Submissions
        document.getElementById('form-settings').onsubmit = async (e) => {
            e.preventDefault();
            if (!auth.currentUser) return;
            const settingsRef = doc(db, 'artifacts', appId, 'public', 'data', 'settings', 'general');
            try {
                await setDoc(settingsRef, {
                    name: document.getElementById('set-name').value,
                    location: document.getElementById('set-location').value,
                    phone: document.getElementById('set-phone').value
                });
                alert("Configuración guardada.");
            } catch (e) { console.error("Save settings error:", e); }
        };

        document.getElementById('form-diplomado').onsubmit = async (e) => {
            e.preventDefault();
            if (!auth.currentUser) return;

            const id = document.getElementById('diplomado-id').value;
            const data = {
                nombre: document.getElementById('nombre').value,
                duracion: document.getElementById('duracion').value,
                fechaInicio: document.getElementById('fechaInicio').value,
                costoReal: parseFloat(document.getElementById('costoReal').value),
                costoCobrar: parseFloat(document.getElementById('costoCobrar').value),
                pdfUrl: document.getElementById('pdfUrl').value,
                promociones: document.getElementById('promociones').value,
                updatedAt: new Date().toISOString()
            };

            try {
                if (id) {
                    await setDoc(doc(db, 'artifacts', appId, 'public', 'data', 'diplomados', id), data);
                } else {
                    await addDoc(collection(db, 'artifacts', appId, 'public', 'data', 'diplomados'), data);
                }
                closeModal();
            } catch (e) { console.error("Save diplomado error:", e); }
        };

        initAuth();
    </script>
</body>
</html>
